<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY CYBER SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Consolas;
  background:black;
  color:#00ff88;
  overflow:hidden;
}

/* MATRIX BG */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

/* PANEL */
.panel{
  background:rgba(0,0,0,0.7);
  border:1px solid #00ff8844;
  border-radius:10px;
  padding:8px;
  overflow:auto;
  transition:.3s;
  box-shadow:0 0 15px #00ff8833;
}

.panel:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px #00ff88;
}

/* IMAGE */
img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.7) contrast(1.2);
}

/* LOCK */
.lock{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  background:rgba(0,0,0,0.6);
}

.lock input{
  padding:10px;
  background:black;
  border:1px solid #00ff88;
  color:#00ff88;
  text-align:center;
}

.lock button{
  padding:8px 15px;
  background:#00ff88;
  border:none;
  cursor:pointer;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00ff8811;
}

.song button{
  background:#00ff88;
  border:none;
}

/* PLAYER */
.player{text-align:center;}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ff88;
}

.volume{
  width:100%;
}

/* RADIO */
.radio button{
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ff8811;
  border:none;
}

.radio-toggle{
  width:100%;
  padding:10px;
  background:#00ff88;
  border:none;
  margin:5px 0;
}

.links a{
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin:4px 0;
  background:#00ff8811;
  text-decoration:none;
  color:#00ff88;
}

/* hidden */
.hidden{display:none;}
audio{display:none;}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="dashboard">

<div class="panel"><img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG"></div>

<div class="panel"><img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp"></div>

<div class="panel" id="lockBox">
<img src="https://img.pikbest.com/backgrounds/20250126/guarding-your-digital-life-power-of-passwords-smarter-password-practices_11452980.jpg!f305cw">

<div class="lock">
<div>ENTER PASSWORD</div>
<input type="password" id="pass">
<button onclick="check()">UNLOCK</button>
</div>
</div>

<div class="panel hidden" id="box4"><div id="list1"></div></div>

<div class="panel hidden" id="box5">
<div class="player">
<div id="title">NO SONG</div>
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>

<div class="seek" onclick="seek(event)"><div id="fill"></div></div>

<input class="volume" type="range" min="0" max="1" step="0.1"
oninput="audio.volume=this.value">
</div>

<div id="list2"></div>
</div>

<div class="panel hidden" id="box6">

<div class="radio">
<button onclick="playRadio(0)">RADIO 1</button>
<button onclick="playRadio(1)">RADIO 2</button>
<button onclick="playRadio(2)">RADIO 3</button>
<button onclick="playRadio(3)">RADIO 4</button>

<button class="radio-toggle" onclick="toggleRadio()">PLAY / STOP</button>

<input class="volume" type="range" min="0" max="1" step="0.1"
oninput="radio.volume=this.value">
</div>

<div class="links">
<a href="https://xat.com/2ra" target="_blank">CHAT ></a>
<a href="https://xat.com/7reqa" target="_blank">ROOM ></a>
</div>

</div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

/* MATRIX EFFECT */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let letters="01";
letters=letters.split("");

let font=14;
let columns=c.width/font;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ff88";
ctx.font=font+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*font,drops[i]*font);

if(drops[i]*font>c.height && Math.random()>0.975) drops[i]=0;
drops[i]++;
}
}
setInterval(draw,33);

/* SONGS */
let songs=[["Song1","https://j.top4top.io/m_3769le8x51.mp3"]];
let audio=document.getElementById("audio");

songs.forEach((s,i)=>{
list1.innerHTML+=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
list2.innerHTML+=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
});

function play(i){audio.src=songs[i][1];audio.play();title.innerText=songs[i][0];}
function toggle(){audio.paused?audio.play():audio.pause();}
function next(){play(0);}
function prev(){play(0);}

function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

audio.ontimeupdate=function(){
fill.style.width=(audio.currentTime/audio.duration)*100+"%";
};

/* RADIO */
let radio=document.getElementById("radio");
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv"
];

function playRadio(i){radio.src=radios[i];radio.play();}
function toggleRadio(){radio.paused?radio.play():radio.pause();}

/* PASSWORD */
function check(){
if(pass.value==="106080"){
lockBox.style.display="none";
box4.classList.remove("hidden");
box5.classList.remove("hidden");
box6.classList.remove("hidden");
}else alert("WRONG");
}

pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

</script>

</body>
</html>
