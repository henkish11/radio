<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* 🔐 LOGIN OVERLAY */
.login{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.login input{
  padding:12px;
  font-size:18px;
  text-align:center;
  background:transparent;
  border:1px solid #00f5ff;
  color:#00f5ff;
  border-radius:8px;
  outline:none;
}

.login button{
  margin-top:10px;
  padding:10px 20px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* GRID (نفسك) */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.glow-name{
  font-size:32px;
  font-weight:bold;
  text-shadow:0 0 10px #00f5ff,0 0 20px #00ffcc;
}

/* SONGS (زي ما هي) */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  text-decoration:none;
  color:#00ffcc;
  background:#00f5ff11;
}

audio{display:none;}
.hidden{display:none;}

</style>
</head>

<body>

<!-- 🔐 PASSWORD SCREEN -->
<div class="login" id="login">
  <h2>ENTER PASSWORD</h2>
  <input type="password" id="pass">
  <button onclick="check()">UNLOCK</button>
</div>

<div class="dashboard hidden" id="main">

<!-- 1 -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="glow-name">RAMY</div>
</div>

<!-- 2 -->
<div class="panel">
<img style="width:100%;height:100%;object-fit:cover"
src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- 3 -->
<div class="panel">
<img style="width:100%;height:100%;object-fit:cover"
src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- 4 LINKS -->
<div class="panel">
<div class="links">
<a href="https://xat.com/2ra">2ra Chat ></a>
<a href="https://xat.com/7reqa">7reqa Chat ></a>
<a href="https://xat.com/trade">Trade Hub ></a>
<a href="https://xat.com/cambio">Cambio Zone ></a>
</div>
</div>

<!-- 5 -->
<div class="panel" id="box5">
<div id="list1"></div>
</div>

<!-- 6 -->
<div class="panel" id="box6">
<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>

<script>

</script>

</body>
</html>
