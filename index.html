<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GHOST MODE XAT</title>

<style>
body{
  margin:0;
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:Tahoma;
}

/* ===== floating particles ===== */
.particle{
  position:absolute;
  width:3px;
  height:3px;
  background:#00f5ff;
  border-radius:50%;
  opacity:0.4;
  animation:float 8s infinite linear;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0}
  20%{opacity:0.5}
  100%{transform:translateY(-10vh);opacity:0}
}

/* ===== MAIN ===== */
.banner{
  width:728px;
  height:200px;
  position:relative;
  overflow:hidden;
  border-radius:16px;

  background:radial-gradient(circle at 70% 50%,#0a0a0a,#000);
  box-shadow:0 0 40px rgba(0,255,255,0.1);
}

/* ghost glow */
.glow{
  position:absolute;
  width:600px;
  height:600px;
  right:-200px;
  top:-200px;
  background:radial-gradient(circle,rgba(0,255,255,0.15),transparent 70%);
  filter:blur(70px);
  animation:pulse 5s infinite ease-in-out;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

/* dark layer */
.left,.right{
  position:absolute;
  width:55%;
  height:100%;
  top:0;
}
.left{left:0;background:linear-gradient(to right,#000 45%,transparent);}
.right{right:0;background:linear-gradient(to left,#000 45%,transparent);}

/* content */
.content{
  position:absolute;
  left:40px;
  top:50%;
  transform:translateY(-50%);
  z-index:5;
}

.name{
  color:#fff;
  font-size:56px;
  font-weight:900;
  letter-spacing:3px;

  text-shadow:
    0 0 10px #00f5ff,
    0 0 30px #00c3ff,
    0 0 60px #00f5ff;
}

.sign{
  color:#777;
  font-size:12px;
  letter-spacing:5px;
}

/* radio ghost panel */
.radio{
  position:absolute;
  bottom:10px;
  left:40px;
  display:flex;
  gap:6px;
}

.radio button{
  border:none;
  padding:5px 10px;
  border-radius:20px;
  background:rgba(0,255,255,0.15);
  color:#fff;
  cursor:pointer;
  transition:.3s;
}

.radio button:hover{
  box-shadow:0 0 20px #00f5ff;
  transform:scale(1.1);
}

/* songs */
.songs{
  position:absolute;
  right:10px;
  top:10px;
  width:260px;
  height:180px;
  overflow:auto;
}

.songs::-webkit-scrollbar{width:3px}
.songs::-webkit-scrollbar-thumb{background:#00f5ff}

.song{
  display:flex;
  justify-content:space-between;
  padding:4px;
  margin:3px 0;
  font-size:10px;

  background:rgba(0,255,255,0.08);
  color:#fff;
  border-radius:6px;
  transition:.2s;
}

.song:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00f5ff;
}

.song button{
  border:none;
  padding:3px 6px;
  border-radius:5px;
}

.play{background:#00f5ff}
.stop{background:#ff4d4d}

</style>
</head>

<body>

<!-- particles -->
<script>
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*5+5)+"s";
document.body.appendChild(p);
}
</script>

<div class="banner">

<div class="glow"></div>
<div class="left"></div>
<div class="right"></div>

<div class="content">
  <div class="name">GHOST</div>
  <div class="sign">SYSTEM ACTIVE</div>
</div>

<!-- RADIO -->
<div class="radio">
<button onclick="playRadio(0)">QURAN</button>
<button onclick="playRadio(1)">RADIO</button>
<button onclick="toggleRadio()">PLAY</button>
</div>

<!-- SONGS -->
<div class="songs" id="songs"></div>

</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"
];

let radio=document.getElementById("radio");
let is=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
is=true;
}

function toggleRadio(){
if(is){radio.pause();is=false;}
else{radio.play();is=true;}
}

/* SONGS */
let songs=[
["01","https://j.top4top.io/m_3769le8x51.mp3"],
["02","https://k.top4top.io/m_3769enq6z2.mp3"],
["03","https://l.top4top.io/m_3769auk3d3.mp3"],
["04","https://a.top4top.io/m_3769kdadn4.mp3"],
["05","https://b.top4top.io/m_3769kg8sd5.mp3"],
["06","https://c.top4top.io/m_3769ien0c6.mp3"],
["07","https://d.top4top.io/m_3769yw3257.mp3"],
["08","https://e.top4top.io/m_3769yb3k29.mp3"],
["09","https://f.top4top.io/m_37690zriz10.mp3"],
["10","https://b.top4top.io/m_3769lxi681.mp3"],
["11","https://c.top4top.io/m_3769g0kg52.mp3"],
["12","https://d.top4top.io/m_3769xz8mi3.mp3"],
["13","https://e.top4top.io/m_3769o93s34.mp3"],
["14","https://f.top4top.io/m_3769c3tql5.mp3"],
["15","https://g.top4top.io/m_3769r7bcu6.mp3"],
["16","https://l.top4top.io/m_3769p7dkd1.mp3"],
["17","https://a.top4top.io/m_37697muuj2.mp3"],
["18","https://b.top4top.io/m_3769i9yd13.mp3"],
["19","https://c.top4top.io/m_3769ou0bt4.mp3"],
["20","https://d.top4top.io/m_37697zirj5.mp3"],
["21","https://e.top4top.io/m_3769rnmrk6.mp3"],
["22","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let box=document.getElementById("songs");
let player=document.getElementById("player");

songs.forEach(s=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
<button class="stop" onclick="player.pause()">⏹</button>
</div>`;
box.appendChild(div);
});

</script>

</body>
</html>
