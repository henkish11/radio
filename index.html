<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* ================= BOOT SCREEN ================= */
#boot{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.boot-text{
  font-size:18px;
  color:#00f5ff;
  letter-spacing:3px;
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{opacity:0.3;text-shadow:0 0 5px #00f5ff;}
  to{opacity:1;text-shadow:0 0 20px #00f5ff;}
}

.bar{
  width:200px;
  height:4px;
  background:#111;
  margin-top:20px;
  overflow:hidden;
  border-radius:10px;
}

.bar span{
  display:block;
  height:100%;
  width:0;
  background:#00f5ff;
  animation:load 2.5s forwards;
}

@keyframes load{
  to{width:100%;}
}

/* ================= LOGIN ================= */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index:9999;
}

.login-box{
  text-align:center;
}

.login-box input{
  padding:10px;
  width:200px;
  text-align:center;
  border:none;
  border-radius:6px;
  background:#111;
  color:#fff;
}

.login-box button{
  margin-top:10px;
  padding:8px 20px;
  border:none;
  border-radius:6px;
  background:#00c3ff;
  cursor:pointer;
}

/* ================= ACCESS GRANTED ================= */
#access{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  color:#00f5ff;
  font-size:22px;
  letter-spacing:3px;
  animation:flash 1s ease;
}

@keyframes flash{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* ================= MAIN ================= */
#main{display:none;}

/* باقي تصميمك بدون تغيير */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

.status{
  color:#00f5ff;
}

.brand{
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.box{
  width:900px;
  margin:70px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

.top{display:flex;gap:15px;align-items:center}

.avatar{width:110px;height:110px;border-radius:50%}

.name{
  font-size:44px;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.song{display:flex;justify-content:space-between;margin:4px 0;padding:6px;background:#00c3ff22}

/* MATRIX */
canvas{position:absolute;inset:0;opacity:0.15}

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
<div class="boot-text">BOOTING SYSTEM...</div>
<div class="bar"><span></span></div>
</div>

<!-- LOGIN -->
<div class="login" id="login" style="display:none">
<div class="login-box">
<h3 style="color:#00f5ff">ENTER PASSWORD</h3>
<input type="password" id="pass">
<br>
<button onclick="check()">ENTER</button>
</div>
</div>

<!-- ACCESS GRANTED -->
<div id="access">ACCESS GRANTED</div>

<!-- MAIN -->
<div id="main">

<div class="topbar">
<div class="status">⚡ ONLINE</div>
<div class="brand">BY RAMY</div>
</div>

<div class="box">
<div class="top">
<img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">
<div class="name">RAMY</div>
</div>
</div>

</div>

<script>

/* BOOT SCREEN */
setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("login").style.display="flex";
},2500);

/* SOUND */
function beep(){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.type="square";
osc.frequency.value=800;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.2);
}

/* LOGIN CHECK */
function check(){
if(pass.value==="106080"){

beep();

/* ACCESS GRANTED */
document.getElementById("login").style.display="none";
document.getElementById("access").style.display="flex";

setTimeout(()=>{
document.getElementById("access").style.display="none";
document.getElementById("main").style.display="block";
},1200);

}else{
alert("Wrong Password");
}
}

pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

</script>

</body>
</html>
