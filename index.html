<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT DESIGN TEMPLATE</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Tahoma;
}

/* ====== MAIN BANNER ====== */
.banner {
  width: 728px;
  height: 200px;
  position: relative;
  overflow: hidden;
  border-radius: 14px;

  /* نفس إحساس الخلفية في الصورة */
  background: linear-gradient(120deg, #050505 20%, #0d0d0d 50%, #050505 80%);
}

/* ====== LIGHT GLOW (يمين) ====== */
.banner::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  right: -180px;
  top: -180px;
  background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
  filter: blur(60px);
}

/* ====== LIGHT GLOW (وسط خفيف) ====== */
.banner::after {
  content: "";
  position: absolute;
  width: 350px;
  height: 350px;
  left: 30%;
  top: 10%;
  background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
  filter: blur(50px);
}

/* ====== DARK SIDES (تقسيم الصورة) ====== */
.left-dark,
.right-dark {
  position: absolute;
  top: 0;
  width: 55%;
  height: 100%;
}

.left-dark {
  left: 0;
  background: linear-gradient(to right, #000 35%, transparent);
}

.right-dark {
  right: 0;
  background: linear-gradient(to left, #000 35%, transparent);
}

/* ====== TEXTURE LINES (تفصيلة خفيفة زي الصورة) ====== */
.texture {
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 55px,
    rgba(255,255,255,0.02) 56px
  );
}

/* ====== TEXT AREA ====== */
.content {
  position: absolute;
  left: 50px;
  top: 50%;
  transform: translateY(-50%);
}

/* الاسم الرئيسي */
.name {
  color: #fff;
  font-size: 54px;
  font-weight: bold;
  letter-spacing: 2px;

  text-shadow:
    0 0 10px #fff,
    0 0 25px rgba(255,255,255,0.6),
    0 0 50px rgba(255,255,255,0.3);
}

/* التوقيع */
.sign {
  margin-top: 8px;
  color: #aaa;
  font-size: 14px;
  letter-spacing: 4px;
  opacity: 0.8;
}

</style>
</head>

<body>

<div class="banner">

  <div class="left-dark"></div>
  <div class="right-dark"></div>
  <div class="texture"></div>

  <div class="content">
    <div class="name">MOON</div>
    <div class="sign">нєηкιѕн</div>
  </div>

</div>

</body>
</html>
