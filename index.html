<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* ================= LOGIN ================= */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;

  /* شفافية أقوى */
  background:rgba(2,6,23,0.55);
  backdrop-filter:blur(18px);
  z-index:999;
}

/* BOX أصغر + أفخم */
.login-box{
  width:240px;
  padding:18px;

  border-radius:18px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);

  border:1px solid rgba(0,195,255,0.35);

  box-shadow:
    0 0 20px #00c3ff33,
    0 0 50px #00f5ff22;

  text-align:center;

  animation:boxFloat 4s infinite ease-in-out;
  position:relative;
}

/* أيقونة القفل */
.login-box::before{
  content:"🔒";
  position:absolute;
  top:-18px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  background:#020617;
  padding:5px 8px;
  border-radius:50%;
  box-shadow:0 0 15px #00f5ff;
}

@keyframes boxFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.login-box h3{
  font-size:12px;
  letter-spacing:2px;
  color:#00f5ff;
  text-shadow:0 0 10px #00c3ff;
  margin-top:10px;
}

/* input أصغر */
.login-box input{
  width:100%;
  padding:10px;
  margin-top:10px;

  border:none;
  border-radius:10px;

  background:rgba(2,6,23,0.9);
  color:#fff;

  text-align:center;
  font-size:11px;

  outline:none;

  box-shadow:0 0 10px #00c3ff33;
  transition:.3s;
}

.login-box input:focus{
  transform:scale(1.03);
  box-shadow:0 0 18px #00f5ff;
}

.login-box button{
  width:100%;
  margin-top:10px;
  padding:9px;

  border:none;
  border-radius:10px;

  background:linear-gradient(45deg,#00c3ff,#1e3a8a,#a855f7);
  color:#fff;

  cursor:pointer;

  box-shadow:0 0 20px #00c3ff33;
  transition:.3s;
}

.login-box button:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px #00f5ff;
}

/* ================= باقي الكود زي ما هو ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

.status{
  color:#00f5ff;
  font-weight:bold;
  animation:blink 1.5s infinite;
  text-shadow:0 0 10px #00f5ff;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

.brand{
  font-weight:bold;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:fadeGlow 2s infinite;
}

@keyframes fadeGlow{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

.box{
  width:900px;
  margin:70px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #00c3ff;
}

.name{
  font-size:44px;
  font-weight:900;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* باقي التصميم بدون تغيير */
.radio-btn{padding:6px 10px;border:none;border-radius:20px;background:#00c3ff;cursor:pointer}
.radio-box{margin-top:10px;padding:10px;background:#00c3ff22;border-radius:12px;display:inline-block;cursor:pointer}
.links a{display:block;margin:5px 0;padding:8px;background:#00c3ff22;color:#fff;text-decoration:none;border-radius:8px}
.song{display:flex;justify-content:space-between;padding:6px;margin:4px 0;background:#00c3ff22;border-radius:8px;font-size:12px}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h3>ENTER PASSWORD</h3>
<input type="password" id="pass" placeholder="••••••••">
<button onclick="check()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="topbar">
<div class="status">⚡ ONLINE</div>
<div class="brand">BY RAMY</div>
</div>

<div class="box">

<div class="top">
<img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">
<div class="name">RAMY</div>
</div>

</div>
</div>

<script>
function check(){
if(pass.value==="106080"){
login.style.display="none";
main.style.display="block";
}else alert("Wrong Password");
}
pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});
</script>

</body>
</html>
