<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* ================= HACKER LOGIN 3D ================= */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:#000;
  z-index:999;
}

#matrix{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:0.25;
}

.login-box{
  position:relative;
  padding:25px;
  width:260px;
  text-align:center;

  background:rgba(0,0,0,0.6);
  border:1px solid #00f5ff;

  box-shadow:0 0 20px #00f5ff, 0 0 60px #00c3ff;

  transform:perspective(800px) rotateX(10deg);
  animation:float3d 4s infinite ease-in-out;
}

@keyframes float3d{
  0%,100%{transform:perspective(800px) rotateX(10deg) translateY(0)}
  50%{transform:perspective(800px) rotateX(10deg) translateY(-10px)}
}

.glitch{
  font-size:16px;
  font-weight:bold;
  color:#00f5ff;
  position:relative;
  margin-bottom:10px;
  letter-spacing:2px;
}

.glitch:before,
.glitch:after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
}

.glitch:before{
  color:#ff00ff;
  animation:glitchTop 1s infinite linear alternate-reverse;
}

.glitch:after{
  color:#00ffff;
  animation:glitchBottom 1s infinite linear alternate-reverse;
}

@keyframes glitchTop{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,-2px)}
  40%{transform:translate(-4px,2px)}
  60%{transform:translate(2px,-1px)}
  100%{transform:translate(0)}
}

@keyframes glitchBottom{
  0%{transform:translate(0)}
  20%{transform:translate(2px,2px)}
  40%{transform:translate(4px,-2px)}
  60%{transform:translate(-2px,1px)}
  100%{transform:translate(0)}
}

.login-box input{
  width:100%;
  padding:10px;
  margin-top:10px;
  text-align:center;
  border:none;
  outline:none;
  border-radius:6px;
  background:#050505;
  color:#00f5ff;
  box-shadow:0 0 10px #00f5ff;
}

.login-box button{
  margin-top:10px;
  padding:8px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:linear-gradient(90deg,#00f5ff,#a855f7);
  color:#000;
  font-weight:bold;
  box-shadow:0 0 15px #00f5ff;
}

/* ================= TOP ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

.status{
  color:#00f5ff;
  font-weight:bold;
  animation:blink 1.5s infinite;
  text-shadow:0 0 10px #00f5ff;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

.brand{
  font-weight:bold;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= BOX ================= */
.box{
  width:900px;
  margin:70px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #00c3ff;
}

.name{
  font-size:44px;
  font-weight:900;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.radio-btn{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  background:#00c3ff;
  cursor:pointer;
}

.radio-box{
  margin-top:10px;
  padding:10px;
  background:#00c3ff22;
  border-radius:12px;
  display:inline-block;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:block;
  margin:5px 0;
  padding:8px;
  background:#00c3ff22;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
}

/* SONGS */
.wrap{display:flex;gap:10px;margin-top:10px}
.col{flex:1}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00c3ff22;
  border-radius:8px;
  font-size:12px;
}

.play{background:#00c3ff;border:none;padding:3px 6px;border-radius:6px}
.stop{background:#ff4d4d;border:none;padding:3px 6px;border-radius:6px}

</style>
</head>

<body>

<!-- MAIN -->

</div>

<script>

/* LOGIN */
function check(){
if(pass.value==="106080"){
login.style.display="none";
main.style.display="block";
}else alert("Wrong Password");
}

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let letters="01RAMYHACKSYSTEM";
letters=letters.split("");

let font=14;
let cols=canvas.width/font;
let drops=Array.from({length:cols}).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5ff";
ctx.font=font+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*font,drops[i]*font);

if(drops[i]*font>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,33);

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let isRadio=false;

function playRadio(i){
radio.pause();
radio.src=radios[i];
radio.play();
isRadio=true;
}

function toggleRadio(){
if(!radio.src) radio.src=radios[0];
if(isRadio){radio.pause();isRadio=false;}
else{radio.play();isRadio=true;}
}

/* SONGS (22) */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],

<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>

</script>
