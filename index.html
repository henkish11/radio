<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro XAT Design</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Tahoma;
}

/* القالب */
.banner {
  width: 728px;
  height: 200px;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  background: linear-gradient(120deg, #000 40%, #111 100%);
}

/* خلفية ديناميك */
.bg {
  position: absolute;
  width: 120%;
  height: 120%;
  top: -10%;
  left: -10%;
  background:
    radial-gradient(circle at 70% 40%, rgba(255,255,255,0.08), transparent 60%),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,0.05), transparent 70%);
  filter: blur(30px);
}

/* إضاءة قوية زي الصورة */
.glow {
  position: absolute;
  right: -80px;
  top: -80px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
  filter: blur(50px);
}

/* تغميق الجوانب */
.dark-left {
  position: absolute;
  left: 0;
  width: 60%;
  height: 100%;
  background: linear-gradient(to right, #000 20%, transparent);
}

.dark-right {
  position: absolute;
  right: 0;
  width: 60%;
  height: 100%;
  background: linear-gradient(to left, #000 20%, transparent);
}

/* خطوط احترافية */
.lines {
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 60px,
    rgba(255,255,255,0.02) 61px
  );
}

/* نويز خفيف */
.noise {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: url('https://www.transparenttextures.com/patterns/noise.png');
  opacity: 0.05;
}

/* النص */
.content {
  position: absolute;
  left: 60px;
  top: 50%;
  transform: translateY(-50%);
}

/* الاسم */
.name {
  color: #fff;
  font-size: 54px;
  font-weight: bold;
  letter-spacing: 3px;
  text-shadow:
    0 0 10px #fff,
    0 0 25px rgba(255,255,255,0.7),
    0 0 50px rgba(255,255,255,0.4);
}

/* التوقيع */
.sign {
  color: #bbb;
  margin-top: 10px;
  letter-spacing: 5px;
  font-size: 13px;
}
</style>

</head>
<body>

<div class="banner">

  <div class="bg"></div>
  <div class="glow"></div>

  <div class="dark-left"></div>
  <div class="dark-right"></div>

  <div class="lines"></div>
  <div class="noise"></div>

  <div class="content">
    <div class="name">YOUR NAME</div>
    <div class="sign">your sign</div>
  </div>

</div>

</body>
</html>
