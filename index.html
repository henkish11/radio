<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Player</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

.status{
  color:#00f5ff;
  font-weight:bold;
}

/* CONTAINER */
.box{
  width:900px;
  margin:80px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

/* RADIO */
.radio{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.radio button{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#00c3ff;
}

.radio .toggle{
  background:#00ffb3;
  color:#000;
}

/* SONGS */
.wrap{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00c3ff22;
  border-radius:8px;
  font-size:12px;
}

.song:hover{
  transform:scale(1.05);
  transition:.2s;
}

/* BUTTONS */
.song button{
  border:none;
  padding:3px 6px;
  border-radius:6px;
}

.play{background:#00c3ff}
.stop{background:#ff4d4d}
</style>
</head>

<body>

<div class="topbar">
<div class="status" id="status">OFFLINE</div>
<div>BY RAMY</div>
</div>

<div class="box">

<!-- RADIO FIXED -->
<div class="radio">
<button onclick="playRadio(0)">قرآن</button>
<button onclick="playRadio(1)">ميلودي</button>
<button onclick="playRadio(2)">حماقي</button>
<button onclick="playRadio(3)">منوعات</button>
<button class="toggle" onclick="toggleRadio()">▶ تشغيل / إيقاف</button>
</div>

<!-- SONG LIST -->
<div class="wrap">
<div class="col" id="left"></div>
<div class="col" id="right"></div>
</div>

</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* RADIO WORKING */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let isRadio=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
isRadio=true;
}

function toggleRadio(){
if(!radio.src) return;
if(isRadio){
radio.pause();
isRadio=false;
}else{
radio.play();
isRadio=true;
}
}

/* 22 SONGS FIXED */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let left=document.getElementById("left");
let right=document.getElementById("right");
let player=document.getElementById("player");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";

div.innerHTML=`
${s[0]}
<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
<button class="stop" onclick="player.pause()">⏹</button>
</div>`;

/* LEFT / RIGHT */
(i%2===0 ? left : right).appendChild(div);
});

</script>

</body>
</html>
