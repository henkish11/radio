<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - BY RAMY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{background: radial-gradient(circle at top,#010514,#020617);color:#fff;}
canvas{position:fixed;inset:0;z-index:-2}

/* LOGIN */
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);z-index:50}
.login-box{width:300px;padding:18px;border-radius:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)}
.login-box input{width:100%;margin:8px 0;padding:9px;background:#0f172a;border:none;color:#fff;border-radius:8px}
.login-box button{width:100%;padding:9px;background:linear-gradient(45deg,#0ea5e9,#1e3a8a);border:none;color:#fff;border-radius:8px}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;padding:8px 15px;display:flex;justify-content:space-between;background:rgba(0,0,0,0.4);z-index:10}
.status{color:#38bdf8}

/* MAIN */
.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:80px; /* 👈 النزول */
}

.profile{
  width:900px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
}

/* TOP */
.top{display:flex;gap:15px;align-items:center}
.top img{width:100px;border-radius:50%}
.name{font-size:28px;color:#4fc3ff}

/* RADIO */
.radio-box{display:flex;gap:8px;margin-top:5px}
.radio-btn{padding:6px;background:#00c3ff;border:none;border-radius:20px;color:#000;cursor:pointer}

/* LINKS */
.world{display:block;margin-top:8px;padding:8px;background:#003b5c;border-radius:8px;color:#fff;text-decoration:none}

/* PLAYER */
#winamp{margin-top:10px}
.artist{text-align:center;font-size:22px;color:#00c3ff;margin:10px 0}

.song{display:flex;justify-content:space-between;background:#002b40;margin:2px 0;padding:5px;border-radius:6px;font-size:12px}
.song button{border:none;padding:3px 6px;border-radius:5px;cursor:pointer}
.play{background:#00c3ff}
.stop{background:red;color:#fff}
</style>
</head>

<body>

<!-- RADIO -->
<audio id="radio1" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="radio2" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
<audio id="radio3" src="https://stream.zeno.fm/w7atxdpk1pdvv"></audio>
<audio id="radio4" src="https://stream.zeno.fm/hswv0qwu7vgtv"></audio>

<div class="container">
<div class="profile">

<div class="top">
<img src="https://xatimg.com/image/RKP5IrStF45l.png">
<div>
<div class="name">Ramy</div>

<div class="radio-box">
<button class="radio-btn" onclick="playRadio(1)">قرآن</button>
<button class="radio-btn" onclick="playRadio(2)">ميلودي</button>
<button class="radio-btn" onclick="playRadio(3)">حماقي</button>
<button class="radio-btn" onclick="playRadio(4)">منوعات</button>
</div>

</div>
</div>

<a class="world" href="https://xat.com/2ra" target="_blank">2ra</a>
<a class="world" href="https://xat.com/7reqa" target="_blank">7reqa</a>
<a class="world" href="https://xat.com/trade" target="_blank">trade</a>
<a class="world" href="https://xat.com/cambio" target="_blank">cambio</a>

<div id="winamp">
<div class="artist">🎤 ليل المحمدي</div>

<audio id="player"></audio>
<div id="list"></div>

</div>

</div>
</div>

<script>

/* RADIO */
let radios=[radio1,radio2,radio3,radio4];
function playRadio(i){
  radios.forEach(r=>r.pause());
  radios[i-1].play();
}

/* 21 SONGS */
let songs=[
"https://j.top4top.io/m_3769le8x51.mp3",
"https://k.top4top.io/m_3769enq6z2.mp3",
"https://l.top4top.io/m_3769auk3d3.mp3",
"https://a.top4top.io/m_3769kdadn4.mp3",
"https://b.top4top.io/m_3769kg8sd5.mp3",
"https://c.top4top.io/m_3769ien0c6.mp3",
"https://d.top4top.io/m_3769yw3257.mp3",
"https://e.top4top.io/m_3769yb3k29.mp3",
"https://f.top4top.io/m_37690zriz10.mp3",
"https://b.top4top.io/m_3769lxi681.mp3",
"https://c.top4top.io/m_3769g0kg52.mp3",
"https://d.top4top.io/m_3769xz8mi3.mp3",
"https://e.top4top.io/m_3769o93s34.mp3",
"https://f.top4top.io/m_3769c3tql5.mp3",
"https://g.top4top.io/m_3769r7bcu6.mp3",
"https://l.top4top.io/m_3769p7dkd1.mp3",
"https://a.top4top.io/m_37697muuj2.mp3",
"https://b.top4top.io/m_3769i9yd13.mp3",
"https://c.top4top.io/m_3769ou0bt4.mp3",
"https://d.top4top.io/m_37697zirj5.mp3",
"https://e.top4top.io/m_3769rnmrk6.mp3"
];

let player=document.getElementById("player");
let list=document.getElementById("list");

songs.forEach((url,i)=>{
  let div=document.createElement("div");
  div.className="song";
  div.innerHTML=`Song ${i+1}
  <button class="play" onclick="player.src='${url}';player.play()">▶</button>
  <button class="stop" onclick="player.pause()">⏹</button>`;
  list.appendChild(div);
});

</script>

</body>
</html>
