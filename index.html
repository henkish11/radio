<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CYBER SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:monospace;
  color:#00ff88;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== scan lines ===== */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,255,120,0.03),
    rgba(0,255,120,0.03) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
}

/* MAIN TERMINAL */
.terminal{
  width:750px;
  height:400px;
  background:#000;
  border:1px solid #00ff88;
  box-shadow:0 0 30px #00ff8855;
  padding:15px;
  position:relative;
}

/* header */
.header{
  color:#00ff88;
  font-size:12px;
  margin-bottom:10px;
}

/* system text */
.log{
  font-size:11px;
  height:120px;
  overflow:hidden;
}

/* blinking cursor */
.cursor{
  display:inline-block;
  width:8px;
  background:#00ff88;
  animation:blink .8s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}

/* radio */
.radio{
  margin-top:10px;
}

.radio button{
  background:#000;
  border:1px solid #00ff88;
  color:#00ff88;
  padding:5px 10px;
  cursor:pointer;
}

.radio button:hover{
  background:#00ff8820;
}

/* songs */
.songs{
  margin-top:10px;
  height:180px;
  overflow:auto;
  border-top:1px solid #00ff88;
  padding-top:10px;
}

.song{
  display:flex;
  justify-content:space-between;
  padding:3px;
  font-size:10px;
  border-bottom:1px dashed #00ff8844;
}

.song button{
  background:#000;
  border:1px solid #00ff88;
  color:#00ff88;
  font-size:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="terminal">

<div class="header">
> CYBER SYSTEM ONLINE... OK<br>
> STATUS: CONNECTED<br>
> SECURITY: LOW PROFILE MODE<br>
</div>

<div class="log" id="log"></div>

<div class="radio">
<button onclick="playRadio()">START RADIO</button>
<button onclick="toggle()">STOP</button>
</div>

<div class="songs" id="songs"></div>

<div style="margin-top:10px;">
> root@system:<span class="cursor"></span>
</div>

</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* fake terminal log */
let logs=[
"[OK] initializing system...",
"[OK] loading modules...",
"[OK] connecting radio server...",
"[OK] decrypting media list...",
"[OK] system ready."
];

let i=0;
let logBox=document.getElementById("log");

setInterval(()=>{
if(i<logs.length){
logBox.innerHTML+=logs[i]+"<br>";
i++;
}
},800);

/* radio */
let radio=document.getElementById("radio");
let on=false;

function playRadio(){
radio.src="https://stream.radiojar.com/8s5u5tpdtwzuv";
radio.play();
on=true;
}

function toggle(){
radio.pause();
on=false;
}

/* songs */
let songs=[
["track_01","https://j.top4top.io/m_3769le8x51.mp3"],
["track_02","https://k.top4top.io/m_3769enq6z2.mp3"],
["track_03","https://l.top4top.io/m_3769auk3d3.mp3"],
["track_04","https://a.top4top.io/m_3769kdadn4.mp3"],
["track_05","https://b.top4top.io/m_3769kg8sd5.mp3"],
["track_06","https://c.top4top.io/m_3769ien0c6.mp3"]
];

let box=document.getElementById("songs");
let player=document.getElementById("player");

songs.forEach(s=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<div>
<button onclick="player.src='${s[1]}';player.play()">RUN</button>
</div>`;
box.appendChild(div);
});

</script>

</body>
</html>
