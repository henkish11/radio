<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#0a0f1f,#05060a);
color:#00f5ff;
overflow:hidden;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr 1fr;
grid-template-rows:230px 1fr;
height:100vh;
gap:6px;
padding:6px;
}

.panel{
background:rgba(0,0,0,0.65);
border:1px solid #00f5ff22;
border-radius:8px;
padding:8px;
overflow:hidden;
transition:0.3s;
box-shadow:0 0 10px rgba(0,255,255,0.1);
}

.panel:hover{
transform:scale(1.02);
box-shadow:0 0 18px #00f5ff55;
}

/* BOX 1 */
.profile{text-align:center;}

.avatar{
width:70px;
border-radius:50%;
border:2px solid #00f5ff;
box-shadow:0 0 10px #00f5ff;
}

.glow-name{
font-size:22px;
animation:pulse 1.5s infinite;
text-shadow:0 0 10px #00f5ff;
}

@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:0.4}
}

/* LINKS */
.links a{
display:block;
text-decoration:none;
color:#00ffcc;
padding:6px;
margin:4px 0;
background:#00f5ff11;
border-radius:6px;
transition:0.3s;
}

.links a:hover{
transform:scale(1.05);
background:#00f5ff33;
}

/* RADIO */
.radio button{
background:#00f5ff;
border:none;
padding:5px;
margin:3px;
cursor:pointer;
}

/* SONG */
.song{
display:flex;
justify-content:space-between;
padding:5px;
margin:3px 0;
background:#00f5ff11;
font-size:11px;
}

.song button{
background:#00f5ff;
border:none;
cursor:pointer;
}

/* PLAYER */
.seek{
width:95%;
height:6px;
background:#111;
cursor:pointer;
}

#fill{
height:100%;
width:0%;
background:#00ffcc;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 PROFILE -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="glow-name">RAMY</div>
</div>

<!-- 2 -->
<div class="panel">SYSTEM</div>

<!-- 3 -->
<div class="panel">LOGIN AREA</div>

<!-- 4 RADIO + LINKS -->
<div class="panel">

<div class="radio">
<button onclick="playRadio(0)">Radio</button>
<button onclick="toggleRadio()">▶/⏸</button>
</div>

<div class="links">
<a target="_blank" href="https://xat.com/2ra">2ra Chat ></a>
<a target="_blank" href="https://xat.com/7reqa">7reqa Chat ></a>
<a target="_blank" href="https://xat.com/trade">Trade Hub ></a>
<a target="_blank" href="https://xat.com/cambio">Cambio Zone ></a>
</div>

</div>

<!-- 5 SONGS -->
<div class="panel">
<div id="list1"></div>
</div>

<!-- 6 SONGS -->
<div class="panel">
<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

let radio=document.getElementById("radio");

let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv"
];

function playRadio(i){
radio.src=radios[i];
radio.play();
}

function toggleRadio(){
radio.paused?radio.play():radio.pause();
}

/* 22 SONGS */
let songs=[
["1","https://j.top4top.io/m_3769le8x51.mp3"],
["2","https://k.top4top.io/m_3769enq6z2.mp3"],
["3","https://l.top4top.io/m_3769auk3d3.mp3"],
["4","https://a.top4top.io/m_3769kdadn4.mp3"],
["5","https://b.top4top.io/m_3769kg8sd5.mp3"],
["6","https://c.top4top.io/m_3769ien0c6.mp3"],
["7","https://d.top4top.io/m_3769yw3257.mp3"],
["8","https://e.top4top.io/m_3769yb3k29.mp3"],
["9","https://f.top4top.io/m_37690zriz10.mp3"],
["10","https://b.top4top.io/m_3769lxi681.mp3"],
["11","https://c.top4top.io/m_3769g0kg52.mp3"],
["12","https://d.top4top.io/m_3769xz8mi3.mp3"],
["13","https://e.top4top.io/m_3769o93s34.mp3"],

];

let audio=document.getElementById("audio");

let list1=document.getElementById("list1");
let list2=document.getElementById("list2");

function play(i){
audio.src=songs[i][1];
audio.play();
}

/* SPLIT */
songs.forEach((s,i)=>{
let html=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<11) list1.innerHTML+=html;
else list2.innerHTML+=html;
});

</script>

</body>
</html>
