<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radio by ramy</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
    font-family:Arial;
}

.box{
    text-align:center;
    padding:25px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    box-shadow:0 0 20px #00ffcc55;
    width:300px;
}

h2{
    color:#00ffcc;
    text-shadow:0 0 10px #00ffcc;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.play{background:#00ffcc;}
.stop{background:#ff4444;color:white;}

p{
    margin-top:10px;
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="box">

    <h2>🎧 Radio by ramy</h2>

    <audio id="radio"></audio>

    <button class="play" onclick="playRadio()">▶ تشغيل</button>
    <button class="stop" onclick="stopRadio()">⏸ إيقاف</button>

    <p>Powered by ramy 💎</p>

</div>

<script>
let radio = document.getElementById("radio");

// 🎵 Playlist بتاعتك
let songs = [
"https://files.catbox.moe/l3v5de.mp3",
"https://files.catbox.moe/3dgk4m.mp3",
"https://files.catbox.moe/dhklgh.mp3",
"https://files.catbox.moe/0mn7qi.mp3",
"https://files.catbox.moe/d1ppiw.mp3",
"https://files.catbox.moe/wl7kuy.mp3",
"https://files.catbox.moe/4topxh.mp3",
"https://files.catbox.moe/z7d6tg.mp3",
"https://files.catbox.moe/7lua61.mp3",
"https://files.catbox.moe/17u38n.mp3",
"https://files.catbox.moe/3vsv5k.mp3",
"https://files.catbox.moe/0dhvei.mp3",
"https://files.catbox.moe/h7fa10.mp3",
"https://files.catbox.moe/yl4ngh.mp3",
"https://files.catbox.moe/mfr80z.mp3",
"https://files.catbox.moe/6zoirr.mp3",
"https://files.catbox.moe/nqcdgi.mp3",
"https://files.catbox.moe/w6mbo9.mp3",
"https://files.catbox.moe/fvabge.mp3",
"https://files.catbox.moe/l8gmod.mp3",
"https://files.catbox.moe/lmqvi3.mp3"
];

let index = 0;
radio.src = songs[index];
radio.volume = 0.7;

function playRadio(){
    radio.play();
}

function stopRadio(){
    radio.pause();
}

// لما الأغنية تخلص يروح للي بعدها
radio.onended = function(){
    index++;
    if(index >= songs.length){
        index = 0;
    }
    radio.src = songs[index];
    radio.play();
};
</script>

</body>
</html>
