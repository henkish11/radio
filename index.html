<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

/* HACKER BOX */
.hacker-box{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PROFILE */
.profile{text-align:center;}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:26px;
  text-shadow:0 0 10px #00f5ff;
}

/* LOCK BOX (BOX 3) */
.lock-box{
  position:relative;
}

.lock-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.lock-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* hidden panels before unlock */
.locked{
  filter:blur(4px);
  pointer-events:none;
  opacity:0.4;
}

/* input */
.lock-overlay input{
  padding:8px;
  text-align:center;
  background:#111;
  border:none;
  color:#00f5ff;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
  padding:3px 6px;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- BOX 1 -->
<div class="panel hacker-box">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- BOX 2 -->
<div class="panel hacker-box">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- BOX 3 LOCK -->
<div class="panel lock-box" id="box3">

<img src="https://img.pikbest.com/backgrounds/20250126/guarding-your-digital-life-power-of-passwords-smarter-password-practices_11452980.jpg!f305cw">

<div class="lock-overlay" id="lockScreen">
<div>🔐 ENTER PASSWORD</div>
<input type="password" id="pass">
<button onclick="check()">UNLOCK</button>
</div>

</div>

<!-- BOX 4 -->
<div class="panel profile locked" id="box4">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>
</div>

<!-- BOX 5 -->
<div class="panel locked" id="box5">SONGS 1</div>

<!-- BOX 6 -->
<div class="panel locked" id="box6">SONGS 2</div>

</div>

<script>

/* PASSWORD SYSTEM */
function check(){
let p=document.getElementById("pass").value;

if(p==="106080"){

document.getElementById("lockScreen").style.display="none";

/* unlock all */
document.getElementById("box4").classList.remove("locked");
document.getElementById("box5").classList.remove("locked");
document.getElementById("box6").classList.remove("locked");

alert("ACCESS GRANTED ✔");

}else{
alert("WRONG PASSWORD ❌");
}

}

</script>

</body>
</html>
