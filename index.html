<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

/* HACKER BOX */
.hacker-box{
  display:flex;
  align-items:center;
  justify-content:center;
}

.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOCK */
.lock-box{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.lock-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

.lock-ui{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.45);
}

.lock-ui input{
  padding:8px;
  background:#111;
  border:none;
  color:#00f5ff;
  text-align:center;
  border-radius:5px;
  margin-top:8px;
}

.lock-ui button{
  margin-top:8px;
  padding:6px 12px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:24px;
  text-shadow:0 0 10px #00f5ff;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.seek{
  width:90%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

/* VOLUME SLIDER */
.volume{
  width:120px;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel hacker-box">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- 2 -->
<div class="panel hacker-box">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- 3 LOCK -->
<div class="panel lock-box">

<img src="https://img.pikbest.com/backgrounds/20250126/guarding-your-digital-life-power-of-passwords-smarter-password-practices_11452980.jpg!f305cw">

<div class="lock-ui">
<div>🔐 ENTER PASSWORD</div>
<input type="password" id="pass">
<button onclick="check()">UNLOCK</button>
</div>

</div>

<!-- 4 FULL PROFILE RESTORED -->
<div class="panel profile">

<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">

<div class="name">RAMY</div>

<!-- RADIO -->
<div style="margin-top:6px;">
<button onclick="playRadio(0)">🎧 قرآن</button>
<button onclick="playRadio(1)">🎶 ميلودي</button>
<button onclick="playRadio(2)">🎤 حماقي</button>
<button onclick="playRadio(3)">🔥 منوعات</button>
</div>

<button onclick="toggleRadio()" style="margin-top:6px;background:#00ffcc;border:none;padding:5px;cursor:pointer;">
▶ / ⏸ راديو
</button>

<!-- LINKS -->
<div style="margin-top:8px;">
<a href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a><br>
<a href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a><br>
<a href="https://xat.com/trade" target="_blank">💰 Trade Hub</a><br>
<a href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>
</div>

<!-- VOLUME SLIDER -->
<div style="margin-top:10px;">
🔊 الصوت
<input class="volume" type="range" min="0" max="1" step="0.01" oninput="audio.volume=this.value">
</div>

</div>

<!-- 5 -->
<div class="panel" id="left"></div>

<!-- 6 -->
<div class="panel" id="right"></div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

/* PASSWORD */
function check(){
if(pass.value==="106080"){
document.querySelectorAll(".panel").forEach(p=>p.style.opacity="1");
init();
}else alert("WRONG PASSWORD");
}

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let rstate=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
rstate=true;
}

function toggleRadio(){
if(!radio.src) radio.src=radios[0];
rstate?radio.pause():radio.play();
rstate=!rstate;
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],

["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");
let index=0;

let left=document.getElementById("left");
let right=document.getElementById("right");

function init(){

left.innerHTML="🎵 PLAYER READY";

songs.slice(0,11).forEach((s,i)=>{
left.innerHTML+=`
<div class="song">
${s[0]}
<button onclick="play(${i})">▶</button>
</div>`;
});

right.innerHTML="🎧 SONG LIST";

songs.slice(11).forEach((s,i)=>{
right.innerHTML+=`
<div class="song">
${s[0]}
<button onclick="play(${i+11})">▶</button>
</div>`;
});

}

/* PLAY */
function play(i){
audio.src=songs[i][1];
audio.play();
index=i;
}

</script>

</body>
</html>
