<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#0a0f1f,#05060a);
color:#00f5ff;
overflow:hidden;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr 1fr;
grid-template-rows:230px 1fr;
height:100vh;
gap:6px;
padding:6px;
}

.panel{
background:rgba(0,0,0,0.65);
border:1px solid #00f5ff22;
border-radius:8px;
padding:8px;
overflow:hidden;
transition:0.3s;
}

.panel:hover{
transform:scale(1.02);
box-shadow:0 0 20px #00f5ff55;
}

/* PROFILE */
.profile{text-align:center;}

.avatar{
width:80px;
border-radius:50%;
border:2px solid #00f5ff;
}

.glow{
text-shadow:0 0 10px #00f5ff;
}

/* LINKS */
.links a{
display:flex;
justify-content:space-between;
padding:6px;
margin:4px 0;
text-decoration:none;
color:#00ffcc;
background:#00f5ff11;
border-radius:6px;
}

.links a:hover{
background:#00f5ff33;
transform:scale(1.03);
}

/* SONGS */
.song{
display:flex;
justify-content:space-between;
padding:5px;
margin:3px 0;
background:#00f5ff11;
font-size:11px;
}

.song button{
background:#00f5ff;
border:none;
cursor:pointer;
}

/* PLAYER */
.seek{
width:100%;
height:6px;
background:#111;
cursor:pointer;
}

#fill{
height:100%;
width:0%;
background:#00ffcc;
}

.btn{
background:#00f5ff;
border:none;
padding:5px;
margin:3px;
cursor:pointer;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel profile glow">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<h2>RAMY</h2>
</div>

<!-- 2 -->
<div class="panel">BOX</div>

<!-- 3 -->
<div class="panel">SYSTEM</div>

<!-- 4 RADIO + LINKS -->
<div class="panel glow">

<button class="btn" onclick="toggleRadio()">▶ / ⏸ RADIO</button>
<button class="btn" onclick="radio.volume=Math.min(radio.volume+0.1,1)">🔊 +</button>
<button class="btn" onclick="radio.volume=Math.max(radio.volume-0.1,0)">🔉 -</button>

<div class="links">
<a target="_blank" href="https://xat.com/2ra">2ra Chat ></a>
<a target="_blank" href="https://xat.com/7reqa">7reqa Chat ></a>
<a target="_blank" href="https://xat.com/trade">Trade Hub ></a>
<a target="_blank" href="https://xat.com/cambio">Cambio Zone ></a>
</div>

</div>

<!-- 5 SONGS -->
<div class="panel">
<div id="list1"></div>
</div>

<!-- 6 SONGS -->
<div class="panel">
<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

let audio=document.getElementById("audio");
let radio=document.getElementById("radio");

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"
];

function toggleRadio(){
if(!radio.src) radio.src=radios[0];
radio.paused?radio.play():radio.pause();
}

/* 22 SONGS */
let songs=[
["1","https://j.top4top.io/m_3769le8x51.mp3"],
["2","https://k.top4top.io/m_3769enq6z2.mp3"],
["3","https://l.top4top.io/m_3769auk3d3.mp3"],
["4","https://a.top4top.io/m_3769kdadn4.mp3"],
["5","https://b.top4top.io/m_3769kg8sd5.mp3"],
["6","https://c.top4top.io/m_3769ien0c6.mp3"],
["7","https://d.top4top.io/m_3769yw3257.mp3"],
["8","https://e.top4top.io/m_3769yb3k29.mp3"],
["9","https://f.top4top.io/m_37690zriz10.mp3"],
["10","https://b.top4top.io/m_3769lxi681.mp3"],
["11","https://c.top4top.io/m_3769g0kg52.mp3"],
["12","https://d.top4top.io/m_3769xz8mi3.mp3"],
["13","https://e.top4top.io/m_3769o93s34.mp3"],
["14","https://f.top4top.io/m_3769c3tql5.mp3"],
["15","https://g.top4top.io/m_3769r7bcu6.mp3"],
["16","https://l.top4top.io/m_3769p7dkd1.mp3"],
["17","https://a.top4top.io/m_37697muuj2.mp3"],
["18","https://b.top4top.io/m_3769i9yd13.mp3"],
["19","https://c.top4top.io/m_3769ou0bt4.mp3"],
["20","https://d.top4top.io/m_37697zirj5.mp3"],
["21","https://e.top4top.io/m_3769rnmrk6.mp3"],
["22","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

songs.forEach((s,i)=>{
let el=`<div class="song glow">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<11) list1.innerHTML+=el;
else list2.innerHTML+=el;
});

function play(i){
audio.src=songs[i][1];
audio.play();
}

</script>

</body>
</html>
