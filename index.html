<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
}

/* HOVER */
.panel:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px #00f5ff;
}

/* IMAGES */
.panel img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 المربع الأول (صورة + اسم) */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* ✨ صورة أصغر */
.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #00f5ff;
  box-shadow:0 0 15px #00f5ff;
}

/* ✨ الاسم ظاهر ومتوَهّج */
.name{
  margin-top:8px;
  font-size:28px;
  font-weight:bold;
  color:#00f5ff;
  text-shadow:0 0 10px #00f5ff,0 0 25px #00ffcc;
}

/* SONGS */
.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player{
  text-align:center;
}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:100%;
}

/* RADIO */
.radio button{
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00f5ff11;
  border:none;
  color:#00ffcc;
}

.radio-toggle{
  width:100%;
  padding:10px;
  background:#00ffcc;
  border:none;
  margin:6px 0;
  cursor:pointer;
}

.links a{
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin:4px 0;
  text-decoration:none;
  color:#00ffcc;
  background:#00f5ff11;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 PROFILE -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>
</div>

<!-- 2 IMAGE -->
<div class="panel">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- 3 IMAGE -->
<div class="panel">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- 4 RADIO + LINKS -->
<div class="panel">

<div class="radio">
<button>🎧 قرآن</button>
<button>🎶 ميلودي</button>
<button>🎤 حماقي</button>
<button>🔥 منوعات</button>
</div>

<button class="radio-toggle">▶ / ⏸ RADIO</button>

<input type="range" min="0" max="1" step="0.1">

<div class="links">
<a href="#">Chat 1 ></a>
<a href="#">Chat 2 ></a>
<a href="#">Trade ></a>
<a href="#">Zone ></a>
</div>

</div>

<!-- 5 SONGS -->
<div class="panel" id="box5">
<div id="list1"></div>
</div>

<!-- 6 SONGS -->
<div class="panel" id="box6">
<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>

<script>

</script>

</body>
</html>
