<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY HACK SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* ================= GRID LAYOUT ================= */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:260px 1fr;
  height:100vh;
  gap:10px;
  padding:10px;
}

/* BOX STYLE */
.panel{
  background:rgba(0,0,0,0.6);
  border:1px solid #00f5ff33;
  box-shadow:0 0 20px #00f5ff22;
  border-radius:10px;
  padding:10px;
  overflow:hidden;
}

/* ================= TOP LEFT BOOT ================= */
.boot{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.boot h1{
  font-size:22px;
  letter-spacing:3px;
}

.bar{
  width:80%;
  height:6px;
  background:#111;
  margin-top:10px;
  border-radius:10px;
  overflow:hidden;
}

.bar span{
  display:block;
  height:100%;
  width:0;
  background:#00f5ff;
  animation:load 3s forwards;
}

@keyframes load{to{width:100%}}

/* ================= TOP MIDDLE HACK ================= */
.terminal{
  font-size:11px;
  line-height:18px;
  color:#00ff99;
}

/* ================= TOP RIGHT LOGIN ================= */
.login-box{
  text-align:center;
}

.login-box input{
  width:80%;
  padding:10px;
  margin-top:10px;
  text-align:center;
  background:#111;
  border:none;
  color:#00f5ff;
  border-radius:6px;
}

.login-box button{
  margin-top:10px;
  padding:8px 15px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* ================= BOTTOM LEFT PROFILE ================= */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:40px;
  margin-top:10px;
  background:linear-gradient(90deg,#00f5ff,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= BOTTOM CENTER SONGS ================= */
.songs{
  overflow:auto;
  height:100%;
}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:5px 0;
  background:#00f5ff11;
  border-radius:6px;
  font-size:12px;
}

.song button{
  border:none;
  cursor:pointer;
}

/* ================= BOTTOM RIGHT CONTROL ================= */
.control{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.big-btn{
  padding:10px 20px;
  background:#00f5ff;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

</style>
</head>

<body>

<div class="dashboard">

<!-- TOP LEFT -->
<div class="panel boot">
<h1>BOOT SYSTEM</h1>
<div class="bar"><span></span></div>
</div>

<!-- TOP MIDDLE -->
<div class="panel terminal">
[+] Connecting to system...<br>
[+] Bypassing firewall...<br>
[+] Injecting payload...<br>
[+] Accessing server...<br>
[+] SYSTEM READY ✔
</div>

<!-- TOP RIGHT -->
<div class="panel login-box">
<h3>ENTER PASSWORD</h3>
<input type="password" id="pass">
<br>
<button onclick="check()">ACCESS</button>
</div>

<!-- BOTTOM LEFT -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">
<div class="name">RAMY</div>
</div>

<!-- BOTTOM CENTER SONGS -->
<div class="panel songs">

<div class="song">Song 1 <button>▶</button></div>
<div class="song">Song 2 <button>▶</button></div>
<div class="song">Song 3 <button>▶</button></div>
<div class="song">Song 4 <button>▶</button></div>
<div class="song">Song 5 <button>▶</button></div>

</div>

<!-- BOTTOM RIGHT -->
<div class="panel control">
<button class="big-btn">PLAY RADIO</button>
<button class="big-btn">STOP</button>
</div>

</div>

<script>
function check(){
if(pass.value==="106080"){
alert("ACCESS GRANTED");
}else{
alert("WRONG PASSWORD");
}
}
</script>

</body>
</html>
