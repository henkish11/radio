<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 15px rgba(0,255,255,0.08);
}

/* HOVER ZOOM */
.panel:hover,
.song:hover,
.radio button:hover,
.links a:hover,
.player button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,255,255,0.4);
}

/* IMAGE BOX */
.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* =========================
   ⭐ PROFILE (فخم)
========================= */

.profile{
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #00f5ff;
  box-shadow:0 0 25px #00f5ff,0 0 60px #00ffcc;
  animation:avatarGlow 2s infinite alternate;
}

@keyframes avatarGlow{
  from{transform:scale(1); box-shadow:0 0 20px #00f5ff;}
  to{transform:scale(1.05); box-shadow:0 0 45px #00ffcc;}
}

.glow-name{
  margin-top:10px;
  font-size:34px;
  font-weight:bold;
  color:#00f5ff;
  text-shadow:0 0 10px #00f5ff,0 0 25px #00ffcc,0 0 40px #00f5ff;
  animation:blink 1.5s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.4}
}

/* =========================
   ⭐ RADIO (أفخم)
========================= */

.radio{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

.radio button{
  background:linear-gradient(90deg,#00f5ff,#00ffcc);
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 10px #00f5ff33;
}

.radio button:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px #00f5ff;
}

.radio-toggle{
  width:100%;
  padding:12px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  margin-top:6px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px #00ffcc55;
}

/* =========================
   ⭐ LINKS (أفخم)
========================= */

.links{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:10px;
}

.links a{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  background:rgba(0,255,255,0.08);
  border:1px solid #00f5ff33;
  text-decoration:none;
  color:#00ffcc;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,255,255,0.1);
}

.links a:hover{
  transform:scale(1.07);
  background:rgba(0,255,255,0.2);
  box-shadow:0 0 25px #00f5ff;
}

/* SONGS */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* LOCK */
.lock{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.lock input{
  padding:8px;
  text-align:center;
  background:#111;
  border:none;
  color:#00f5ff;
}

.lock button{
  padding:6px 10px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.seek{
  width:90%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:90%;
}

audio{display:none;}
.hidden{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel hacker-box">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

</body>
</html>
