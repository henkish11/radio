<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

/* HACKER */
.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PROFILE FIX */
.profile{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* NAME + IMAGE (IMAGE LEFT) */
.top-profile{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

/* GLOW NAME */
.glow-name{
  font-size:28px;
  font-weight:bold;
  animation:pulse 1.5s infinite;
  text-shadow:0 0 10px #00f5ff,0 0 20px #00f5ff;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:0.4}
  100%{opacity:1}
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
}

.radio button{
  flex:1;
  padding:8px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* BIG RADIO BUTTON */
.radio-toggle{
  width:100%;
  padding:10px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* LINKS */
.links a{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00f5ff11;
  color:#00ffcc;
  text-decoration:none;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
}

.song button{
  background:#00f5ff;
  border:none;
}

/* PLAYER */
.player{
  display:flex;
  flex-direction:column;
  gap:6px;
  align-items:center;
}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:100%;
}

/* VOLUME BOX */
.volume-box{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.hidden{display:none;}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel hacker-box">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- 2 -->
<div class="panel hacker-box">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- 3 PASSWORD -->

display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;background:rgba(0,0,0,0.6);">

<div>🔐 ENTER PASSWORD</div>

</div>

</div>

<!-- 4 PROFILE -->
<div class="panel profile hidden" id="box4">

<div class="top-profile">

<div class="glow-name">RAMY</div>

<!-- RADIO FULL -->

▶ / ⏸ تشغيل / إيقاف الراديو

<!-- LINKS -->
<div class="links">

<!-- RADIO VOLUME -->
<input type="range" min="0" max="1" step="0.1"
oninput="radio.volume=this.value">

<!-- 5 PLAYER -->
<div class="panel hidden" id="box5">

<div class="player">

<div id="title">NO SONG</div>

<button onclick="toggle()">▶ / ⏸</button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>

<input class="volume" type="range" min="0" max="1" step="0.1"
oninput="audio.volume=this.value">

</div>

<div id="list1"></div>

</div>

<!-- 6 VOLUME -->
<div class="panel hidden" id="box6">

<div class="volume-box">

<h4>🔊 SOUND</h4>

<button onclick="audio.volume=Math.min(audio.volume+0.1,1)">➕ رفع</button>
<button onclick="audio.volume=Math.max(audio.volume-0.1,0)">➖ خفض</button>

<input type="range" min="0" max="1" step="0.1"
oninput="audio.volume=this.value">

</div>

<audio id="audio"></audio>

<script>

function play(i){

audio.paused?audio.play():audio.pause();
}

function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

/* PASSWORD + ENTER */
function check(){

document.getElementById("pass").addEventListener("keydown",e=>{

});

</script>

</body>
</html>
