<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY CONTROL SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:220px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

/* PANELS */
.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
}

/* BOOT */
.boot{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.bar{
  width:80%;
  height:5px;
  background:#111;
}
.bar span{
  display:block;
  height:100%;
  width:0;
  background:#00f5ff;
  animation:load 3s forwards;
}
@keyframes load{to{width:100%}}

/* TERMINAL */
.terminal{
  color:#00ff00;
  font-family:monospace;
}

/* LOGIN */
.login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:26px;
  text-shadow:0 0 10px #00f5ff;
}

/* SONGS */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  font-size:11px;
}

/* ===== PLAYER BIG SPLIT ===== */
.player{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:900px;
  height:120px;
  background:rgba(0,0,0,0.85);
  border:1px solid #00f5ff55;
  border-radius:12px;
  display:flex;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

/* BOX 4 (TRACK + SEEK) */
.p4{
  flex:1;
  padding:10px;
  border-right:1px solid #00f5ff33;
}

#title{
  font-size:12px;
  margin-bottom:10px;
}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
  position:relative;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

/* BOX 5 (PLAY + SPEED) */
.p5{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  border-right:1px solid #00f5ff33;
}

.p5 button{
  background:#00f5ff;
  border:none;
  padding:5px 8px;
  cursor:pointer;
}

/* BOX 6 (VOLUME) */
.p6{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.p6 input{
  width:120px;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel boot">
<h3>BOOT SYSTEM</h3>
<div class="bar"><span></span></div>
</div>

<!-- 2 -->
<div class="panel terminal">
SYSTEM ONLINE<br>
ROOT ACCESS ✔
</div>

<!-- 3 -->
<div class="panel login">
<h3>LOGIN</h3>
<input type="password" id="pass">
<button onclick="check()">ENTER</button>
</div>

<!-- 4 -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>
</div>

<!-- 5 -->
<div class="panel" id="left"></div>

<!-- 6 -->
<div class="panel" id="right"></div>

</div>

<!-- ===== BIG PLAYER ===== -->
<div class="player">

<!-- 4 -->
<div class="p4">
<div id="title">No Song</div>
<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>
</div>

<!-- 5 -->
<div class="p5">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶ / ⏸</button>
<button onclick="next()">⏭</button>
<button onclick="speed(1.25)">1.25x</button>
<button onclick="speed(1.5)">1.5x</button>
</div>

<!-- 6 -->
<div class="p6">
🔊
<input type="range" min="0" max="1" step="0.1" onchange="volume(this.value)">
</div>

</div>

<audio id="audio"></audio>

<script>

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");
let index=0;

/* PLAY */
function playSong(i){
audio.src=songs[i][1];
audio.play();
index=i;
document.getElementById("title").innerText=songs[i][0];
}

/* NEXT PREV */
function next(){
index=(index+1)%songs.length;
playSong(index);
}

function prev(){
index=(index-1+songs.length)%songs.length;
playSong(index);
}

/* PLAY PAUSE */
function toggle(){
audio.paused?audio.play():audio.pause();
}

/* SPEED */
function speed(v){
audio.playbackRate=v;
}

/* VOLUME */
function volume(v){
audio.volume=v;
}

/* SEEK BAR */
function seek(e){
let bar=e.currentTarget;
let pos=e.offsetX/bar.offsetWidth;
audio.currentTime=pos*audio.duration;
}

audio.ontimeupdate=function(){
let p=(audio.currentTime/audio.duration)*100;
document.getElementById("fill").style.width=p+"%";
};

</script>

</body>
</html>
