<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY HACK SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* ================= GRID ================= */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:260px 1fr;
  height:100vh;
  gap:10px;
  padding:10px;
}

/* ================= PANEL ================= */
.panel{
  background:rgba(0,0,0,0.6);
  border:1px solid #00f5ff33;
  box-shadow:0 0 20px #00f5ff22;
  border-radius:10px;
  padding:10px;
  overflow:hidden;
}

/* ================= BOOT ================= */
.boot{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.boot h1{
  font-size:18px;
  letter-spacing:2px;
}

.loader{
  width:80px;
  height:80px;
  margin:10px 0;
  filter:drop-shadow(0 0 10px #00f5ff);
}

.bar{
  width:80%;
  height:6px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.bar span{
  display:block;
  height:100%;
  width:0;
  background:#00f5ff;
  animation:load 3s forwards;
}

@keyframes load{
  to{width:100%}
}

/* ================= TERMINAL ================= */
.terminal{
  color:#00ff00;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.hack-container{
  display:flex;
  align-items:center;
  gap:10px;
}

.hacker-img{
  width:70px;
  height:70px;
  filter:drop-shadow(0 0 10px #00ff00);
}

.hack-text{
  font-size:12px;
  line-height:18px;
  text-shadow:0 0 5px #00ff00;
}

.mini-bar{
  margin-top:10px;
  width:100%;
  height:5px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.mini-bar span{
  display:block;
  height:100%;
  width:0;
  background:#00ff00;
  animation:load 3s forwards;
}

/* ================= LOGIN (UPDATED) ================= */
.login-box{
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.login-box h3{
  color:#66faff;
  text-shadow:0 0 10px #66faff;
  letter-spacing:2px;
}

/* lock image */
.lock-img{
  width:80px;
  height:80px;
  margin:10px 0;
  filter:drop-shadow(0 0 15px #66faff);
}

/* input */
.login-box input{
  width:80%;
  padding:10px;
  margin-top:10px;
  text-align:center;
  background:#111;
  border:1px solid #66faff;
  color:#66faff;
  border-radius:6px;
  box-shadow:0 0 10px #66faff33;
}

/* button */
.login-box button{
  margin-top:10px;
  padding:8px 15px;
  background:#66faff;
  border:none;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 15px #66faff;
}

/* ================= PROFILE ================= */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:40px;
  margin-top:10px;
  background:linear-gradient(90deg,#00f5ff,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= SONGS ================= */
.songs{
  overflow:auto;
}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:5px 0;
  background:#00f5ff11;
  border-radius:6px;
  font-size:12px;
}

/* ================= CONTROL ================= */
.control{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.big-btn{
  padding:10px 20px;
  background:#00f5ff;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

</style>
</head>

<body>

<div class="dashboard">

<!-- BOOT -->
<div class="panel boot">
  <h1>BOOTING RAMY SYSTEM</h1>
  <img class="loader" src="https://i.gifer.com/ZZ5H.gif">
  <div class="bar"><span></span></div>
</div>

<!-- TERMINAL -->
<div class="panel terminal">

  <div class="hack-container">
    <img class="hacker-img" src="https://i.imgur.com/3ZQ3Z4M.png">
    
    <div class="hack-text">
      [+] Initializing stealth protocol...<br>
      [+] Breaching firewall layers...<br>
      [+] Injecting root access...<br>
      [+] SYSTEM COMPROMISED ✔
    </div>
  </div>

  <div class="mini-bar">
    <span></span>
  </div>

</div>

<!-- LOGIN UPDATED -->
<div class="panel login-box">

<h3>ENTER PASSWORD</h3>

<img class="lock-img" src="https://cdn-icons-png.flaticon.com/512/2911/2911230.png">

</div>

<!-- PROFILE -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">
<div class="name">RAMY</div>
</div>

<!-- SONGS -->
<div class="panel songs">
<div class="song">Song 1 <button>▶</button></div>
<div class="song">Song 2 <button>▶</button></div>
<div class="song">Song 3 <button>▶</button></div>
<div class="song">Song 4 <button>▶</button></div>
<div class="song">Song 5 <button>▶</button></div>
</div>

<!-- CONTROL -->
<div class="panel control">
<button class="big-btn">PLAY RADIO</button>
<button class="big-btn">STOP</button>
</div>

</div>

<script>

if(pass.value==="106080"){

}
</script>

</body>
</html>
