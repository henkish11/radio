<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radio Fix</title>
</head>
<body style="background:#000; color:white; text-align:center; font-family:Arial;">

<h2>🎧 Radio Test</h2>

<audio id="radio"></audio>

<button onclick="playRadio()">▶ تشغيل</button>
<button onclick="stopRadio()">⏸ إيقاف</button>

<p id="status">جاهز</p>

<script>
let radio = document.getElementById("radio");

let songs = [
"https://files.catbox.moe/l3v5de.mp3"
];

let index = 0;

radio.src = songs[index];
radio.volume = 1;

function playRadio(){
    let playPromise = radio.play();

    if(playPromise !== undefined){
        playPromise.then(()=>{
            document.getElementById("status").innerText = "🔊 شغال";
        }).catch(err=>{
            document.getElementById("status").innerText = "❌ مش شغال: " + err;
            console.log(err);
        });
    }
}

function stopRadio(){
    radio.pause();
    document.getElementById("status").innerText = "⏸ متوقف";
}

radio.onerror = function(){
    document.getElementById("status").innerText = "❌ مشكلة في الصوت (اللينك)";
};
</script>

</body>
</html>
