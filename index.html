<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT TEMPLATE</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Tahoma;
}

/* القالب */
.box {
  width: 728px;
  height: 200px;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  background: #111;
}

/* الصورة (اختياري تغيرها) */
.box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.5);
}

/* طبقة التأثير */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(to right, rgba(0,0,0,0.9), transparent 50%),
    linear-gradient(to left, rgba(0,0,0,0.9), transparent 50%);
}

/* النص */
.content {
  position: absolute;
  left: 40px;
  top: 50%;
  transform: translateY(-50%);
}

/* الاسم */
.name {
  color: #fff;
  font-size: 50px;
  font-weight: bold;
  text-shadow:
    0 0 10px #fff,
    0 0 25px rgba(255,255,255,0.7);
}

/* التوقيع */
.sign {
  color: #aaa;
  font-size: 14px;
  margin-top: 5px;
  letter-spacing: 3px;
}
</style>

</head>
<body>

<div class="box">
  <!-- غير الصورة هنا -->
  <img src="https://via.placeholder.com/728x200">

  <div class="overlay"></div>

  <div class="content">
    <div class="name">YOUR NAME</div>
    <div class="sign">your sign</div>
  </div>
</div>

</body>
</html>
