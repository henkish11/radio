<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM FIXED</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

/* PANELS */
.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
}

/* BOOT */
.boot{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:26px;
  text-shadow:0 0 10px #00f5ff;
}

/* SONG ITEM */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
  padding:3px 6px;
}

/* ================= PLAYER INSIDE BOX 5 ================= */
.player-box{
  display:flex;
  flex-direction:column;
  height:100%;
  justify-content:space-between;
}

.now{
  font-size:12px;
  text-align:center;
  padding:5px;
  color:#00f5ff;
}

.controls{
  display:flex;
  justify-content:center;
  gap:5px;
  margin:5px 0;
}

.controls button{
  background:#00f5ff;
  border:none;
  padding:5px 8px;
  cursor:pointer;
}

/* progress */
.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
  position:relative;
}

.fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

/* VOLUME */
.volume{
  display:flex;
  justify-content:center;
  margin-top:5px;
}

.volume input{
  width:80%;
}

/* AUDIO */
audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel boot">
BOOT SYSTEM
</div>

<!-- 2 -->
<div class="panel">
SYSTEM ONLINE ✔
</div>

<!-- 3 -->
<div class="panel">
LOGIN
</div>

<!-- 4 -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>
</div>

<!-- 5 (PLAYER + SONGS CONTROL) -->
<div class="panel">
<div class="player-box">

<div class="now" id="title">No Song Playing</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶ / ⏸</button>
<button onclick="next()">⏭</button>
</div>

<div class="seek" onclick="seek(event)">
<div class="fill" id="bar"></div>
</div>

<div class="volume">
<input type="range" min="0" max="1" step="0.1" onchange="volume(this.value)">
</div>

</div>
</div>

<!-- 6 SONG LIST -->
<div class="panel" id="list"></div>

</div>

<audio id="audio"></audio>

<script>

let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"]
];

let audio=document.getElementById("audio");
let index=0;

/* render songs */
let list=document.getElementById("list");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<button onclick="playSong(${i})" id="btn${i}">▶</button>
`;
list.appendChild(div);
});

/* play */
function playSong(i){
if(index===i && !audio.paused){
audio.pause();
document.getElementById("btn"+i).innerText="▶";
return;
}

audio.src=songs[i][1];
audio.play();
index=i;

updateButtons();
document.getElementById("title").innerText=songs[i][0];
}

/* update buttons */
function updateButtons(){
songs.forEach((_,i)=>{
let b=document.getElementById("btn"+i);
if(b) b.innerText="▶";
});
document.getElementById("btn"+index).innerText="⏸";
}

/* next prev */
function next(){
playSong((index+1)%songs.length);
}

function prev(){
playSong((index-1+songs.length)%songs.length);
}

/* toggle */
function toggle(){
audio.paused?audio.play():audio.pause();
updateButtons();
}

/* volume */
function volume(v){
audio.volume=v;
}

/* seek */
function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

/* progress */
audio.ontimeupdate=function(){
document.getElementById("bar").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

</script>

</body>
</html>
