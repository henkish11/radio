<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Design Template</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Tahoma;
}

/* القالب الأساسي */
.banner {
  width: 728px;
  height: 200px;
  position: relative;
  overflow: hidden;
  border-radius: 14px;
  background: radial-gradient(circle at 70% 50%, #222 0%, #000 70%);
}

/* إضاءة خفيفة زي الصورة */
.light {
  position: absolute;
  width: 400px;
  height: 400px;
  top: -100px;
  right: -100px;
  background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
  filter: blur(40px);
}

/* تغميق الجوانب */
.shade-left {
  position: absolute;
  width: 50%;
  height: 100%;
  left: 0;
  top: 0;
  background: linear-gradient(to right, #000 10%, transparent);
}

.shade-right {
  position: absolute;
  width: 50%;
  height: 100%;
  right: 0;
  top: 0;
  background: linear-gradient(to left, #000 10%, transparent);
}

/* خطوط ديزاين خفيفة */
.lines {
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 40px,
    rgba(255,255,255,0.03) 41px
  );
}

/* النص */
.content {
  position: absolute;
  left: 50px;
  top: 50%;
  transform: translateY(-50%);
}

/* الاسم */
.name {
  color: #fff;
  font-size: 52px;
  font-weight: bold;
  letter-spacing: 2px;
  text-shadow:
    0 0 10px #fff,
    0 0 25px rgba(255,255,255,0.6);
}

/* التوقيع */
.sign {
  color: #aaa;
  margin-top: 8px;
  letter-spacing: 4px;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="banner">

  <div class="light"></div>
  <div class="shade-left"></div>
  <div class="shade-right"></div>
  <div class="lines"></div>

  <div class="content">
    <div class="name">YOUR NAME</div>
    <div class="sign">your sign</div>
  </div>

</div>

</body>
</html>
