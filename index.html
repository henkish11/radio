<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
  transition:0.3s;
}

.panel:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px #00f5ff;
}

/* IMAGE */
.panel img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PROFILE FIXED */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.avatar{
  width:85px;
  height:85px;
  border-radius:50%;
  border:2px solid #00f5ff;
  box-shadow:0 0 20px #00f5ff;
}

.name{
  font-size:26px;
  margin-top:8px;
  font-weight:bold;
  color:#00f5ff;
  text-shadow:0 0 10px #00f5ff,0 0 20px #00ffcc;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player{
  text-align:center;
}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:100%;
}

/* RADIO */
.radio button{
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00f5ff11;
  border:none;
  color:#00ffcc;
}

.radio-toggle{
  width:100%;
  padding:10px;
  background:#00ffcc;
  border:none;
  margin:6px 0;
  cursor:pointer;
}

.links a{
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin:4px 0;
  text-decoration:none;
  color:#00ffcc;
  background:#00f5ff11;
}

audio{display:none;}

.hidden{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 PROFILE -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>
</div>

<!-- 2 IMAGE -->
<div class="panel">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- 3 IMAGE -->
<div class="panel">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- 4 RADIO + LINKS -->
<div class="panel">

<div class="radio">
<button onclick="playRadio(0)">🎧 قرآن</button>
<button onclick="playRadio(1)">🎶 ميلودي</button>
<button onclick="playRadio(2)">🎤 حماقي</button>
<button onclick="playRadio(3)">🔥 منوعات</button>
</div>

<button class="radio-toggle" onclick="toggleRadio()">▶ / ⏸ RADIO</button>

<input type="range" min="0" max="1" step="0.1" oninput="radio.volume=this.value">

<div class="links">
<a href="https://xat.com/2ra" target="_blank">2ra ></a>
<a href="https://xat.com/7reqa" target="_blank">7reqa ></a>
<a href="https://xat.com/trade" target="_blank">Trade ></a>
<a href="https://xat.com/cambio" target="_blank">Cambio ></a>
</div>

</div>

<!-- 5 SONGS -->
<div class="panel hidden" id="box5">

<div class="player">
<div id="title">NO SONG</div>

<button onclick="toggle()">▶ / ⏸</button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>

<input class="volume" type="range" min="0" max="1" step="0.1"
oninput="audio.volume=this.value">
</div>

<div id="list1"></div>
</div>

<!-- 6 SONGS -->
<div class="panel hidden" id="box6">
<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

let audio=document.getElementById("audio");
let radio=document.getElementById("radio");
let index=0;

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

function playRadio(i){
radio.src=radios[i];
radio.play();
}

function toggleRadio(){
radio.paused?radio.play():radio.pause();
}

/* 22 SONGS */
let songs=[
["1","https://j.top4top.io/m_3769le8x51.mp3"],
["2","https://k.top4top.io/m_3769enq6z2.mp3"],
["3","https://l.top4top.io/m_3769auk3d3.mp3"],
["4","https://a.top4top.io/m_3769kdadn4.mp3"],
["5","https://b.top4top.io/m_3769kg8sd5.mp3"],
["6","https://c.top4top.io/m_3769ien0c6.mp3"],
["7","https://d.top4top.io/m_3769yw3257.mp3"],
["8","https://e.top4top.io/m_3769yb3k29.mp3"],
["9","https://f.top4top.io/m_37690zriz10.mp3"],
["10","https://b.top4top.io/m_3769lxi681.mp3"],
["11","https://c.top4top.io/m_3769g0kg52.mp3"],
["12","https://d.top4top.io/m_3769xz8mi3.mp3"],
["13","https://e.top4top.io/m_3769o93s34.mp3"],
["14","https://f.top4top.io/m_3769c3tql5.mp3"],
["15","https://g.top4top.io/m_3769r7bcu6.mp3"],
["16","https://l.top4top.io/m_3769p7dkd1.mp3"],
["17","https://a.top4top.io/m_37697muuj2.mp3"],
["18","https://b.top4top.io/m_3769i9yd13.mp3"],
["19","https://c.top4top.io/m_3769ou0bt4.mp3"],
["20","https://d.top4top.io/m_37697zirj5.mp3"],
["21","https://e.top4top.io/m_3769rnmrk6.mp3"],
["22","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

/* SPLIT FIX */
let list1=document.getElementById("list1");
let list2=document.getElementById("list2");

function render(){
list1.innerHTML="";
list2.innerHTML="";

songs.forEach((s,i)=>{
let el=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<11) list1.innerHTML+=el;
else list2.innerHTML+=el;
});
}

render();

/* PLAY */
function play(i){
index=i;
audio.src=songs[i][1];
audio.play();
title.innerText=songs[i][0];
}

function toggle(){
audio.paused?audio.play():audio.pause();
}

function seek(e){
let p=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=p*audio.duration;
}

audio.ontimeupdate=function(){
fill.style.width=(audio.currentTime/audio.duration)*100+"%";
};

</script>

</body>
</html>
