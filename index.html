<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000000dd;
  z-index:999;
}

.login-box{
  width:330px;
  padding:25px;
  border-radius:16px;
  background:linear-gradient(145deg,#0f172a,#020617);
  box-shadow:0 0 25px #00c3ff55;
  text-align:center;
}

.login-box h3{
  color:#00c3ff;
  margin-bottom:10px;
  text-shadow:0 0 10px #00c3ff;
}

.login-box input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#020617;
  color:#fff;
  text-align:center;
  outline:none;
  box-shadow:0 0 10px #00c3ff33;
}

.login-box input:focus{
  box-shadow:0 0 15px #00c3ff;
}

.login-box button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c3ff,#1e3a8a);
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

.login-box button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c3ff;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

/* ONLINE */
.status{
  color:#00f5ff;
  font-weight:bold;
  animation:blink 1.5s infinite;
  text-shadow:0 0 10px #00f5ff;
}
@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

/* BY RAMY */
.brand{
  font-weight:900;
  font-size:13px;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff,#00f5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:fade 2s infinite;
}

/* BOX */
.box{
  width:900px;
  margin:70px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

/* PROFILE */
.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #00c3ff;
  box-shadow:0 0 25px #00c3ff;
}

.name{
  font-size:44px;
  font-weight:900;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* RADIO BUTTONS */
.radio{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.radio-btn{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  background:#00c3ff;
}

/* 🔥 RADIO PLAYER (CLICK + HOVER ZOOM) */
.radio-box{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  background:#00c3ff22;
  display:inline-block;
  transition:.25s;
  cursor:pointer;
}

.radio-box:hover{
  transform:scale(1.15);
  box-shadow:0 0 25px #00c3ff;
}

.radio-box.active{
  transform:scale(1.2);
  box-shadow:0 0 35px #00f5ff;
}

/* LINKS (ZOOM ON HOVER) */
.links a{
  display:block;
  margin:5px 0;
  padding:8px;
  background:#00c3ff22;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  transition:.2s;
}

.links a:hover{
  transform:scale(1.08);
  background:#00c3ff44;
}

/* SONGS */
.wrap{display:flex;gap:10px;margin-top:10px}
.col{flex:1}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00c3ff22;
  border-radius:8px;
  font-size:12px;
}

.song button{
  border:none;
  padding:3px 6px;
  border-radius:6px;
}

.play{background:#00c3ff}
.stop{background:#ff4d4d}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h3>🔐 ENTER PASSWORD</h3>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="check()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="topbar">
<div class="status">⚡ ONLINE</div>
<div class="brand">BY RAMY</div>
</div>

<div class="box">

<div class="top">
<img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">
<div class="name">RAMY</div>
</div>

<div class="radio">
<button class="radio-btn">🎧 قرآن</button>
<button class="radio-btn">🎶 ميلودي</button>
<button class="radio-btn">🎤 حماقي</button>
<button class="radio-btn">🔥 منوعات</button>
</div>

<!-- RADIO CLICK ZONE -->
<div class="radio-box" id="radioBox" onclick="toggleRadio()">
▶ اضغط لتشغيل / إيقاف الراديو
</div>

<!-- LINKS -->
<div class="links">
<a href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>
</div>

<!-- SONGS -->
<div class="wrap">
<div class="col" id="left"></div>
<div class="col" id="right"></div>
</div>

</div>
</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* PASSWORD */
function check(){
if(pass.value==="106080"){
login.style.display="none";
main.style.display="block";
}else alert("Wrong Password");
}
pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let radioBox=document.getElementById("radioBox");
let isRadio=false;

function toggleRadio(){

if(!radio.src){
radio.src=radios[0];
}

if(isRadio){
radio.pause();
isRadio=false;
radioBox.classList.remove("active");
}else{
radio.play();
isRadio=true;
radioBox.classList.add("active");
}
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let left=document.getElementById("left");
let right=document.getElementById("right");
let player=document.getElementById("player");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
<button class="stop" onclick="player.pause()">⏹</button>
</div>`;
(i%2?right:left).appendChild(div);
});

</script>

</body>
</html>
