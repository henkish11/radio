<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOON DESIGN</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0a0a;
  font-family: Arial, sans-serif;
}

.card {
  width: 400px;
  height: 400px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 40px rgba(255,255,255,0.15);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 60px rgba(255,255,255,0.25);
}

.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.6) blur(1px);
}

.content {
  position: absolute;
  bottom: 30px;
  left: 30px;
}

.name {
  color: #fff;
  font-size: 42px;
  font-weight: bold;
  text-shadow:
    0 0 10px #fff,
    0 0 20px #aaa,
    0 0 30px #888;
}

.sign {
  color: #ccc;
  font-size: 14px;
  margin-top: 5px;
  opacity: 0.7;
  letter-spacing: 2px;
}
</style>

</head>
<body>

<div class="card">
  <img src="https://xatimg.com/image/Yr3SZROWxdL1.png" class="bg">

  <div class="content">
    <div class="name">MOON</div>
    <div class="sign">нєηкιѕн</div>
  </div>
</div>

</body>
</html>
