<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:10px;
  padding:8px;
  overflow:auto;
  transition:.3s;
}

/* HOVER EFFECT */
.panel:hover,
.song:hover,
.radio button:hover,
.links a:hover,
.player button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00f5ff;
}

/* IMAGE */
.hacker img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOCK */
.lock{
  position:absolute;
  width:100%;height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  background:rgba(0,0,0,0.6);
}

.lock input{
  padding:10px;
  width:70%;
  text-align:center;
}

.lock button{
  padding:8px 15px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00f5ff11;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player{text-align:center;}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
  margin:5px 0;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:100%;
}

/* RADIO */
.radio button{
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00f5ff11;
  border:none;
  cursor:pointer;
}

.radio-toggle{
  width:100%;
  padding:10px;
  background:#00ffcc;
  border:none;
  margin:5px 0;
}

.links a{
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin:4px 0;
  background:#00f5ff11;
  text-decoration:none;
  color:#00ffcc;
}

.hidden{display:none;}
audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel hacker">

</div>

<!-- 3 PASSWORD -->

<div class="lock">
<div>🔐 ENTER PASSWORD</div>
<input type="password" id="pass">
<button onclick="check()">UNLOCK</button>

</div>

<!-- 4 SONGS -->
<div class="panel hidden" id="box4">

<!-- 5 PLAYER + SONGS -->

<div id="title">NO SONG</div>

<button onclick="prev()">⏮</button>

<button onclick="next()">⏭</button>

<button onclick="autoToggle()">🔁 Auto: <span id="auto">OFF</span></button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>

<input class="volume" type="range" min="0" max="1" step="0.1"
oninput="audio.volume=this.value">
</div>

<div id="list2"></div>

</div>

<!-- 6 RADIO -->
<div class="panel hidden" id="box6">

<div class="radio">

<button onclick="playRadio(0)">🎧 قرآن</button>
<button onclick="playRadio(1)">🎶 ميلودي</button>
<button onclick="playRadio(2)">🎤 حماقي</button>
<button onclick="playRadio(3)">🔥 منوعات</button>

<button class="radio-toggle" onclick="toggleRadio()">▶ / ⏸ تشغيل</button>

<input class="volume" type="range" min="0" max="1" step="0.1"
oninput="radio.volume=this.value">

<div class="links">

<audio id="audio"></audio>

<script>

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],

["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],

["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],

["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");
let index=0;
let auto=false;

/* تقسيم */
songs.forEach((s,i)=>{
let div=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<11) list1.innerHTML+=div;
else list2.innerHTML+=div;
});

/* PLAYER */
function play(i){
index=i;
audio.src=songs[i][1];
audio.play();
title.innerText=songs[i][0];
}

function toggle(){audio.paused?audio.play():audio.pause();}
function next(){play((index+1)%songs.length);}
function prev(){play((index-1+songs.length)%songs.length);}

function autoToggle(){
auto=!auto;
auto?autoTxt("ON"):autoTxt("OFF");
}

function autoTxt(t){document.getElementById("auto").innerText=t;}

audio.onended=function(){
if(auto) next();
};

/* SEEK */
function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

audio.ontimeupdate=function(){
fill.style.width=(audio.currentTime/audio.duration)*100+"%";
};

/* RADIO */
let radio=document.getElementById("radio");
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

function playRadio(i){radio.src=radios[i];radio.play();}
function toggleRadio(){radio.paused?radio.play():radio.pause();}

/* PASSWORD */
function check(){
if(pass.value==="106080"){
lockBox.style.display="none";
box4.classList.remove("hidden");
box5.classList.remove("hidden");
box6.classList.remove("hidden");
}else alert("WRONG PASSWORD");
}

pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

</script>

</body>
</html>
