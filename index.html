<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM ULTIMATE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

/* PANELS */
.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
}

/* BOOT */
.boot{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.bar{
  width:80%;
  height:5px;
  background:#111;
}
.bar span{
  display:block;
  height:100%;
  width:0;
  background:#00f5ff;
  animation:load 3s forwards;
}
@keyframes load{to{width:100%}}

/* TERMINAL */
.terminal{
  font-family:monospace;
  color:#00ff00;
}

/* LOGIN */
.login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:26px;
  text-shadow:0 0 10px #00f5ff;
}

/* SONG ITEM */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  font-size:11px;
  background:#00f5ff11;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* ===== BIG PLAYER ===== */
.player{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:850px;
  height:110px;
  background:rgba(0,0,0,0.85);
  border:1px solid #00f5ff55;
  border-radius:12px;
  display:flex;
  overflow:hidden;
}

/* BOX 4 */
.p4{
  flex:1;
  padding:10px;
  border-right:1px solid #00f5ff33;
}

#title{
  font-size:12px;
}

.seek{
  width:100%;
  height:6px;
  background:#111;
  margin-top:10px;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

/* BOX 5 */
.p5{
  flex:1;
  border-right:1px solid #00f5ff33;
  padding:5px;
  overflow:auto;
}

/* BOX 6 */
.p6{
  flex:1;
  padding:5px;
  overflow:auto;
}

/* AUDIO */
audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel boot">
<h3>BOOT RAMY SYSTEM</h3>
<div class="bar"><span></span></div>
</div>

<!-- 2 -->
<div class="panel terminal">
SYSTEM ONLINE ✔
</div>

<!-- 3 -->
<div class="panel login">
<input type="password" id="pass">
<button onclick="check()">ENTER</button>
</div>

<!-- 4 -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>
</div>

<!-- 5 SONG LIST -->
<div class="panel p5" id="left"></div>

<!-- 6 SONG LIST -->
<div class="panel p6" id="right"></div>

</div>

<!-- PLAYER -->
<div class="player">

<div class="p4">
<div id="title">No Song</div>
<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* LOGIN */
function check(){
if(pass.value==="106080") alert("ACCESS GRANTED");
else alert("WRONG");
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");
let index=0;

/* RENDER SONGS IN BOX 5 & 6 */
let left=document.getElementById("left");
let right=document.getElementById("right");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<button onclick="playSong(${i})">▶</button>
`;

(i<11?left:right).appendChild(div);
});

/* PLAY */
function playSong(i){
audio.src=songs[i][1];
audio.play();
index=i;
document.getElementById("title").innerText=songs[i][0];
}

/* SEEK */
function seek(e){
let bar=e.currentTarget;
let pos=e.offsetX/bar.offsetWidth;
audio.currentTime=pos*audio.duration;
}

/* UPDATE BAR */
audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

</script>

</body>
</html>
