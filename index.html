<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT STYLE</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Tahoma, Arial;
}

/* القالب */
.box {
  width: 728px;
  height: 200px;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

/* الصورة */
.box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.55) blur(0.5px);
}

/* طبقة الإضاءة */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.8) 10%,
    rgba(0,0,0,0.3) 50%,
    rgba(0,0,0,0.8) 90%
  );
}

/* النص */
.text {
  position: absolute;
  top: 50%;
  left: 40px;
  transform: translateY(-50%);
}

/* الاسم */
.name {
  color: #fff;
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 2px;
  text-shadow:
    0 0 10px #fff,
    0 0 20px #aaa,
    0 0 40px rgba(255,255,255,0.5);
}

/* التوقيع */
.sign {
  color: #bbb;
  font-size: 14px;
  margin-top: 5px;
  opacity: 0.8;
  letter-spacing: 3px;
}
</style>

</head>
<body>

<div class="box">
  <img src="https://xatimg.com/image/Yr3SZROWxdL1.png">
  
  <div class="overlay"></div>

  <div class="text">
    <div class="name">MOON</div>
    <div class="sign">нєηкιѕн</div>
  </div>
</div>

</body>
</html>
