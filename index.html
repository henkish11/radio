<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
}

/* PROFILE (UPDATED BOX 4) */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:26px;
  text-shadow:0 0 10px #00f5ff;
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
  margin-top:5px;
}

.radio button{
  background:#00f5ff;
  border:none;
  padding:5px 8px;
  font-size:11px;
  cursor:pointer;
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:8px;
}

.links a{
  color:#00ffcc;
  text-decoration:none;
  padding:6px;
  background:#00f5ff11;
  border-radius:6px;
  transition:0.2s;
}

.links a:hover{
  transform:scale(1.1);
  background:#00f5ff33;
}

/* SONG ITEM */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
  padding:3px 6px;
}

/* MINI PLAYER */
.player-mini{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.player-mini button{
  background:#00f5ff;
  border:none;
  padding:5px 10px;
  cursor:pointer;
  border-radius:5px;
}

#title{
  font-size:12px;
  text-align:center;
}

/* SEEK */
.seek{
  width:90%;
  height:5px;
  background:#111;
  cursor:pointer;
  border-radius:5px;
  overflow:hidden;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

/* VOLUME */
.volume-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.volume-box input{
  width:120px;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel">BOOT SYSTEM</div>

<!-- 2 -->
<div class="panel">HACK TERMINAL</div>

<!-- 3 -->
<div class="panel">LOGIN</div>

<!-- 4 ===== ADDED BACK ===== -->
<div class="panel profile">

<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>

<!-- RADIO -->
<div class="radio">
<button onclick="playRadio(0)">🎧 قرآن</button>
<button onclick="playRadio(1)">🎶 ميلودي</button>
<button onclick="playRadio(2)">🎤 حماقي</button>
<button onclick="playRadio(3)">🔥 منوعات</button>
</div>

<button onclick="toggleRadio()" style="margin-top:5px;background:#00ffcc;border:none;padding:5px;cursor:pointer;">
▶ / ⏸ راديو
</button>

<!-- LINKS (OPEN NEW TAB) -->
<div class="links">
<a href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>
</div>

</div>

<!-- 5 -->
<div class="panel" id="left"></div>

<!-- 6 -->
<div class="panel" id="right"></div>

</div>

<!-- AUDIO -->
<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let rstate=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
rstate=true;
}

function toggleRadio(){
if(!radio.src) radio.src=radios[0];
rstate?radio.pause():radio.play();
rstate=!rstate;
}

/* SONGS (UNCHANGED) */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");
let index=0;

/* LEFT */
let left=document.getElementById("left");
left.innerHTML=`
<div class="player-mini">
<div id="title">No Song</div>
<button onclick="toggle()">▶ / ⏸</button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>
</div>
`;

for(let i=0;i<11;i++){
left.innerHTML+=`
<div class="song">
${songs[i][0]}
<button onclick="playSong(${i})">▶</button>
</div>`;
}

/* RIGHT */
let right=document.getElementById("right");

right.innerHTML=`
<div class="volume-box">
🔊 الصوت
<input type="range" min="0" max="1" step="0.1" onchange="volume(this.value)">
</div>
`;

for(let i=11;i<songs.length;i++){
right.innerHTML+=`
<div class="song">
${songs[i][0]}
<button onclick="playSong(${i})">▶</button>
</div>`;
}

/* FUNCTIONS */
function playSong(i){
audio.src=songs[i][1];
audio.play();
index=i;
document.getElementById("title").innerText=songs[i][0];
}

function toggle(){
audio.paused?audio.play():audio.pause();
}

function volume(v){
audio.volume=v;
}

function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

</script>

</body>
</html>
