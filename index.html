<head>
<meta charset="UTF-8">

<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

/* HACKER BOX */
.hacker-box{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:contrast(1.2) brightness(0.8);
}

.hack-overlay{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.35);
}

.hack-text{
  color:#00ff66;
  font-size:12px;
  text-align:center;
  text-shadow:0 0 10px #00ff66;
  animation:flicker 1.5s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

/* LOCK SCREEN (BOX 3) */
.lock-box{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.lock-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6) contrast(1.2);
}

/* LOGIN OVERLAY */
.lock-overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.lock-overlay input{
  padding:8px;
  border:none;
  text-align:center;
  margin-top:10px;
  background:#111;
  color:#00f5ff;
  border-radius:5px;
}

.lock-overlay button{
  margin-top:10px;
  padding:6px 12px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* HIDE SYSTEM BEFORE LOGIN */
.hidden{
  display:none;
}

/* PROFILE */
.profile{text-align:center;}
.avatar{width:110px;border-radius:50%;border:2px solid #00f5ff;}
.name{font-size:26px;text-shadow:0 0 10px #00f5ff;}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player-mini{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.seek{
  width:90%;
  height:5px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

audio{display:none;}

</style>
</head>
