<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
  transition:0.3s;
}

/* 🔥 GLOW ON HOVER */
.panel:hover,
.song:hover,
a:hover,
button:hover{
  box-shadow:0 0 20px #00f5ff;
  transform:scale(1.03);
  color:#00ffff;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.glow{
  text-shadow:0 0 10px #00f5ff,0 0 25px #00ffcc;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

/* PLAYER */
.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

/* BUTTONS */
.btn{
  background:#00f5ff;
  border:none;
  padding:6px;
  margin:3px;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  text-decoration:none;
  color:#00ffcc;
  background:#00f5ff11;
}

/* AUDIO */
audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 PROFILE -->
<div class="panel profile glow">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<h2>RAMY</h2>
</div>

<!-- 2 IMAGE -->
<div class="panel">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG"
style="width:100%;height:100%;object-fit:cover;">
</div>

<!-- 3 IMAGE -->
<div class="panel">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp"
style="width:100%;height:100%;object-fit:cover;">
</div>

<!-- 4 RADIO + LINKS -->
<div class="panel glow">

<h4>📻 RADIO CONTROL</h4>

<button class="btn" onclick="toggleRadio()">▶ / ⏸</button>
<button class="btn" onclick="radio.volume+=0.1">🔊 +</button>
<button class="btn" onclick="radio.volume-=0.1">🔉 -</button>

<br>

<div class="links glow">
<a href="https://xat.com/2ra">2ra Chat ></a>
<a href="https://xat.com/7reqa">7reqa Chat ></a>
<a href="https://xat.com/trade">Trade Hub ></a>
<a href="https://xat.com/cambio">Zone ></a>
</div>

</div>

<!-- 5 PLAYER -->
<div class="panel glow">
<div id="title">NO SONG</div>

<button class="btn" onclick="toggle()">▶ / ⏸</button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>

<div id="list1"></div>
</div>

<!-- 6 CONTROL -->
<div class="panel glow">

<h4>🔊 MASTER CONTROL</h4>

<button class="btn" onclick="audio.play()">▶ ALL</button>
<button class="btn" onclick="audio.pause()">⏸ STOP</button>

<button class="btn" onclick="audio.volume+=0.1">🔊 UP</button>
<button class="btn" onclick="audio.volume-=0.1">🔉 DOWN</button>

<div id="list2"></div>

</div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

let audio=document.getElementById("audio");
let radio=document.getElementById("radio");

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

function toggleRadio(){
radio.paused?radio.play():radio.pause();
}

/* SONGS (UNCHANGED) */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

songs.forEach((s,i)=>{
let el=`<div class="song glow">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<11) list1.innerHTML+=el;
else list2.innerHTML+=el;
});

function play(i){
audio.src=songs[i][1];
audio.play();
document.getElementById("title").innerText=songs[i][0];
}

/* SEEK BAR */
function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

function toggle(){
audio.paused?audio.play():audio.pause();
}

</script>

</body>
</html>
