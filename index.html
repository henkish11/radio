<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000000dd;
  z-index:999;
}

.login-box{
  width:320px;
  padding:25px;
  border-radius:15px;
  background:#0f172a;
  box-shadow:0 0 25px #00c3ff55;
  text-align:center;
}

.login-box h3{
  color:#00c3ff;
  margin-bottom:10px;
}

.login-box input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#020617;
  color:#fff;
  outline:none;
  text-align:center;
  font-size:14px;
}

.login-box button{
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c3ff,#1e3a8a);
  color:#fff;
  cursor:pointer;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

.status{
  color:#00f5ff;
  font-weight:bold;
}

/* BOX */
.box{
  width:900px;
  margin:70px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:10px;
}

.radio-item{
  padding:8px 12px;
  border-radius:25px;
  background:#00c3ff22;
  cursor:pointer;
  transition:.2s;
  font-size:13px;
}

.radio-item:hover{
  transform:scale(1.15);
  background:#00c3ff55;
}

/* ACTIVE BUTTON */
.active{
  background:#00c3ff;
  color:#000;
  font-weight:bold;
}

/* CONTROL */
.radio-control{
  margin:10px 0;
}

.radio-control button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#00c3ff;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:block;
  margin:5px 0;
  padding:8px;
  background:#00c3ff22;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  transition:.2s;
}

.links a:hover{
  transform:scale(1.05);
}

/* SONGS */
.wrap{display:flex;gap:10px;margin-top:10px}
.col{flex:1}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00c3ff22;
  border-radius:8px;
  font-size:12px;
}

.song button{
  border:none;
  padding:3px 6px;
  border-radius:6px;
}

.play{background:#00c3ff}
.stop{background:#ff4d4d}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h3>🔐 ENTER PASSWORD</h3>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="check()">Enter</button>
</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="topbar">
<div class="status">⚡ ONLINE</div>
<div>BY RAMY</div>
</div>

<div class="box">

<!-- RADIO -->
<div class="radio">
<div class="radio-item" onclick="playRadio(0)">🎧 قرآن</div>
<div class="radio-item" onclick="playRadio(1)">🎶 ميلودي</div>
<div class="radio-item" onclick="playRadio(2)">🎤 حماقي</div>
<div class="radio-item" onclick="playRadio(3)">🔥 منوعات</div>
</div>

<div class="radio-control">
<button onclick="toggleRadio()">▶ / ⏸ تشغيل الراديو</button>
</div>

<!-- LINKS -->
<div class="links">
<a href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>
</div>

<!-- SONGS -->
<div class="wrap">
<div class="col" id="left"></div>
<div class="col" id="right"></div>
</div>

</div>
</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* PASSWORD */
function check(){
if(pass.value==="106080"){
login.style.display="none";
main.style.display="block";
}else{
alert("Wrong Password");
}
}
pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

/* RADIO FIX */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let isPlaying=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
isPlaying=true;
}

function toggleRadio(){
if(!radio.src) return;
if(isPlaying){
radio.pause();
isPlaying=false;
}else{
radio.play();
isPlaying=true;
}
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let left=document.getElementById("left");
let right=document.getElementById("right");
let player=document.getElementById("player");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
<button class="stop" onclick="player.pause()">⏹</button>
</div>`;
(i%2?right:left).appendChild(div);
});

</script>

</body>
</html>
