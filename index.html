<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* ================= LOGIN (معدل فقط - بسيط) ================= */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#020617;
  z-index:999;
}

.login-box{
  text-align:center;
}

.login-box h3{
  font-size:14px;
  color:#00f5ff;
  margin-bottom:10px;
}

.login-box input{
  width:200px;
  padding:10px;
  border:none;
  outline:none;
  border-radius:6px;
  text-align:center;
  background:#111827;
  color:#fff;
}

.login-box button{
  margin-top:10px;
  padding:8px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#00c3ff;
  color:#000;
  font-weight:bold;
}

/* ================= TOP ================= */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

.status{
  color:#00f5ff;
  font-weight:bold;
  animation:blink 1.5s infinite;
  text-shadow:0 0 10px #00f5ff;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

.brand{
  font-weight:bold;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= BOX ================= */
.box{
  width:900px;
  margin:70px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #00c3ff;
}

.name{
  font-size:44px;
  font-weight:900;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.radio-btn{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  background:#00c3ff;
  cursor:pointer;
}

/* RADIO BOX */
.radio-box{
  margin-top:10px;
  padding:10px;
  background:#00c3ff22;
  border-radius:12px;
  display:inline-block;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:block;
  margin:5px 0;
  padding:8px;
  background:#00c3ff22;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
}

/* SONGS */
.wrap{display:flex;gap:10px;margin-top:10px}
.col{flex:1}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00c3ff22;
  border-radius:8px;
  font-size:12px;
}

.play{background:#00c3ff;border:none;padding:3px 6px;border-radius:6px}
.stop{background:#ff4d4d;border:none;padding:3px 6px;border-radius:6px}

</style>
</head>

<body>

<!-- LOGIN (المعدل فقط) -->
<div class="login" id="login">
<div class="login-box">
<h3>ENTER PASSWORD</h3>
<input type="password" id="pass" placeholder="Password">
<br>
<button onclick="check()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="topbar">
<div class="status">⚡ ONLINE</div>
<div class="brand">BY RAMY</div>
</div>

<div class="box">

<div class="top">
<img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">
<div class="name">RAMY</div>
</div>

<!-- RADIO -->
<div class="radio">
<button class="radio-btn" onclick="playRadio(0)">🎧 قرآن</button>
<button class="radio-btn" onclick="playRadio(1)">🎶 ميلودي</button>
<button class="radio-btn" onclick="playRadio(2)">🎤 حماقي</button>
<button class="radio-btn" onclick="playRadio(3)">🔥 منوعات</button>
</div>

<div class="radio-box" onclick="toggleRadio()">▶ / ⏸ تشغيل الراديو</div>

<!-- LINKS -->
<div class="links">
<a href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>
</div>

<!-- SONGS (22 أغنية كما هي) -->
<div class="wrap">
<div class="col" id="left"></div>
<div class="col" id="right"></div>
</div>

</div>
</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* LOGIN */
function check(){
if(pass.value==="106080"){
login.style.display="none";
main.style.display="block";
}else alert("Wrong Password");
}
pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let isRadio=false;

function playRadio(i){
radio.pause();
radio.src=radios[i];
radio.play();
isRadio=true;
}

function toggleRadio(){
if(!radio.src) radio.src=radios[0];

if(isRadio){
radio.pause();
isRadio=false;
}else{
radio.play();
isRadio=true;
}
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let left=document.getElementById("left");
let right=document.getElementById("right");
let player=document.getElementById("player");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
<button class="stop" onclick="player.pause()">⏹</button>
</div>`;
(i%2?right:left).appendChild(div);
});

</script>

</body>
</html>
