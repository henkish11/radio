<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MATRIX MODE</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:monospace;
  color:#00ff66;
}

/* ===== MATRIX BACKGROUND ===== */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* ===== TERMINAL ===== */
.terminal{
  position:relative;
  z-index:2;
  width:750px;
  height:420px;
  margin:auto;
  top:50%;
  transform:translateY(-50%);
  border:1px solid #00ff66;
  box-shadow:0 0 30px #00ff6633;
  padding:15px;
  background:rgba(0,0,0,0.85);
}

/* header */
.header{
  font-size:12px;
  margin-bottom:10px;
}

/* logs */
.logs{
  font-size:11px;
  height:120px;
  overflow:hidden;
}

/* cursor */
.cursor{
  display:inline-block;
  width:8px;
  height:12px;
  background:#00ff66;
  animation:blink .7s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}

/* buttons */
button{
  background:transparent;
  border:1px solid #00ff66;
  color:#00ff66;
  padding:5px 10px;
  cursor:pointer;
  font-family:monospace;
}

button:hover{
  background:#00ff6620;
}

/* songs */
.songs{
  margin-top:10px;
  height:180px;
  overflow:auto;
  border-top:1px solid #00ff66;
  padding-top:10px;
}

.song{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  padding:3px;
  border-bottom:1px dashed #00ff6633;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">

<div class="header">
> MATRIX SYSTEM ACTIVE<br>
> STATUS: CONNECTED TO CORE<br>
> SECURITY: BYPASSED
</div>

<div class="logs" id="logs"></div>

<div>
<button onclick="playRadio()">RADIO ON</button>
<button onclick="stopRadio()">STOP</button>
</div>

<div class="songs" id="songs"></div>

<div style="margin-top:10px;">
root@matrix:<span class="cursor"></span>
</div>

</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* ===== MATRIX RAIN ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function drawMatrix(){
ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text = letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(drawMatrix,35);

/* ===== LOGS ===== */
let logs=[
"[OK] boot sequence started...",
"[OK] scanning network...",
"[OK] firewall disabled...",
"[OK] system unlocked...",
"[OK] matrix connected."
];

let i=0;
let box=document.getElementById("logs");

setInterval(()=>{
if(i<logs.length){
box.innerHTML+=logs[i]+"<br>";
i++;
}
},800);

/* ===== RADIO ===== */
let radio=document.getElementById("radio");

function playRadio(){
radio.src="https://stream.radiojar.com/8s5u5tpdtwzuv";
radio.play();
}

function stopRadio(){
radio.pause();
}

/* ===== SONGS ===== */
let songs=[
["track_01","https://j.top4top.io/m_3769le8x51.mp3"],
["track_02","https://k.top4top.io/m_3769enq6z2.mp3"],
["track_03","https://l.top4top.io/m_3769auk3d3.mp3"],
["track_04","https://a.top4top.io/m_3769kdadn4.mp3"]
];

let list=document.getElementById("songs");
let player=document.getElementById("player");

songs.forEach(s=>{
let d=document.createElement("div");
d.className="song";
d.innerHTML=`
${s[0]}
<button onclick="player.src='${s[1]}';player.play()">RUN</button>
`;
list.appendChild(d);
});

</script>

</body>
</html>
