<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - BY RAMY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#010514,#020617);
  color:#fff;
}

canvas{position:fixed;inset:0;z-index:-2}

/* LOGIN */
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);z-index:50}
.login-box{width:300px;padding:18px;border-radius:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)}
.login-box input{width:100%;margin:8px 0;padding:9px;background:#0f172a;border:none;color:#fff;border-radius:8px}
.login-box button{width:100%;padding:9px;background:linear-gradient(45deg,#0ea5e9,#1e3a8a);border:none;color:#fff;cursor:pointer;border-radius:8px}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;padding:8px 15px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.08);z-index:10;font-size:13px}
.status{color:#38bdf8}

/* PROFILE */
.container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:10px}
.profile{width:900px;max-width:95%;background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));border-radius:20px;border:1px solid rgba(255,255,255,0.1);padding:20px;backdrop-filter:blur(18px);box-shadow:0 0 50px rgba(0,140,255,0.25)}

.top{display:flex;gap:15px;align-items:center}
.top img{width:100px;height:100px;border-radius:50%;border:2px solid #00c3ff}
.name{font-size:32px;font-weight:700;color:#4fc3ff}

/* RADIO */
.radio-box{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.radio-btn{padding:6px 12px;background:linear-gradient(45deg,#00c3ff,#1e3a8a);border:none;border-radius:20px;cursor:pointer;color:#fff;font-size:11px}
.play-toggle{padding:6px 12px;background:#00ffb3;border:none;border-radius:20px;cursor:pointer;color:#000;font-weight:bold}

/* LINKS */
.world{display:block;padding:10px;border-radius:10px;background:rgba(0,195,255,0.1);text-decoration:none;color:#fff;font-size:13px}
.world:hover{background:rgba(0,195,255,0.25);transform:scale(1.02)}

/* PLAYER */
#winamp{
  margin-top:0; /* مفيش مسافة */
  background:linear-gradient(135deg,#000,#001a2e);
  border-top:1px solid rgba(0,195,255,0.3);
  padding:8px;
}

.song{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px;
  margin:3px 0;
  background:rgba(0,195,255,0.1);
  border-radius:6px;
  font-size:12px;
}

.song button{
  margin-left:5px;
  border:none;
  padding:4px 8px;
  border-radius:6px;
  cursor:pointer;
}

.play{background:#00c3ff;color:#000}
.stop{background:#ff4d4d;color:#fff}

.controls{
  text-align:center;
  margin-bottom:6px;
}
.controls button{
  margin:2px;
  padding:5px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.all{background:#00ffb3}
.stopall{background:#ff4d4d;color:#fff}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- RADIO -->
<audio id="radio1" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="radio2" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
<audio id="radio3" src="https://stream.zeno.fm/w7atxdpk1pdvv"></audio>
<audio id="radio4" src="https://stream.zeno.fm/hswv0qwu7vgtv"></audio>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="topbar">
  <div class="status" id="status">⚡ OFFLINE</div>
  <div>by iegypt (106080) ramy</div>
</div>

<div class="container">
<div class="profile">

<div class="top">
<img src="https://xatimg.com/image/RKP5IrStF45l.png">
<div>
<div class="name">Ramy</div>
<div style="font-size:12px;color:#aaa;">ID: 106080</div>

<div class="radio-box">
<button class="radio-btn" onclick="playRadio(1)">🎧 قرآن</button>
<button class="radio-btn" onclick="playRadio(2)">🎶 ميلودي</button>
<button class="radio-btn" onclick="playRadio(3)">🎤 حماقي</button>
<button class="radio-btn" onclick="playRadio(4)">🔥 منوعات</button>
<button class="play-toggle" onclick="toggleRadio()">⏯ تشغيل/إيقاف</button>
</div>
</div>
</div>

<div class="grid">
<div class="card">⚡ I love trading on xat website</div>
<div class="card">❤️ I got involved with Dolly ❤️</div>
</div>

<div class="grid">
<a class="world" href="https://xat.com/2ra">🔥 2ra Chat</a>
<a class="world" href="https://xat.com/7reqa">⚡ 7reqa Chat</a>
<a class="world" href="https://xat.com/trade">💰 Trade Hub</a>
<a class="world" href="https://xat.com/cambio">🌐 Cambio Zone</a>
</div>

<!-- PLAYER -->
<div id="winamp">

<div class="controls">
<button class="all" onclick="playAll()">▶ تشغيل الكل</button>
<button class="stopall" onclick="stopAll()">⏹ إيقاف الكل</button>
</div>

<audio id="player"></audio>
<div id="list"></div>

</div>

</div>
</div>

<script>

/* LOGIN */
function enter(){
  if(password.value==="106080"){
    login.style.display="none";
    status.innerText="⚡ ONLINE";
  }
}
password.addEventListener("keydown",e=>{if(e.key==="Enter") enter()});

/* RADIO */
let radios=[radio1,radio2,radio3,radio4];
let current=null;

function playRadio(i){
  radios.forEach(r=>{r.pause();r.currentTime=0});
  current=radios[i-1];
  current.play();
}
function toggleRadio(){
  if(!current) return;
  current.paused?current.play():current.pause();
}

/* SONGS */
let songs=[ /* نفس ال21 */ 
{n:"نفسى أطمن بيك",u:"https://j.top4top.io/m_3769le8x51.mp3"},
{n:"الشر الاسود",u:"https://k.top4top.io/m_3769enq6z2.mp3"},
{n:"حبي الاولاني",u:"https://l.top4top.io/m_3769auk3d3.mp3"},
{n:"كوابيس",u:"https://a.top4top.io/m_3769kdadn4.mp3"},
{n:"ما تيجي نركن الزعل",u:"https://b.top4top.io/m_3769kg8sd5.mp3"},
{n:"مش تمام",u:"https://c.top4top.io/m_3769ien0c6.mp3"},
{n:"مشوار الحب",u:"https://d.top4top.io/m_3769yw3257.mp3"},
{n:"صاحبة الجلالة",u:"https://e.top4top.io/m_3769yb3k29.mp3"},
{n:"عمالالي عمل",u:"https://f.top4top.io/m_37690zriz10.mp3"},
{n:"بحبها",u:"https://b.top4top.io/m_3769lxi681.mp3"},
{n:"فيكي سر",u:"https://c.top4top.io/m_3769g0kg52.mp3"},
{n:"حياتي قصيدة",u:"https://d.top4top.io/m_3769xz8mi3.mp3"},
{n:"لسه",u:"https://f.top4top.io/m_3769c3tql5.mp3"},
{n:"مش زي غيرها",u:"https://g.top4top.io/m_3769r7bcu6.mp3"},
{n:"نسند بعض",u:"https://a.top4top.io/m_37697muuj2.mp3"},
{n:"ياللي ناسيني",u:"https://b.top4top.io/m_3769i9yd13.mp3"},
{n:"وش السعد",u:"https://c.top4top.io/m_3769ou0bt4.mp3"},
{n:"يا حظ بيه",u:"https://d.top4top.io/m_37697zirj5.mp3"},
{n:"يا اللي نسيني",u:"https://e.top4top.io/m_3769rnmrk6.mp3"}
];

let player=document.getElementById("player");
let list=document.getElementById("list");
let index=0;

function playSong(i){
  player.src=songs[i].u;
  player.play();
  index=i;
}

songs.forEach((s,i)=>{
  let div=document.createElement("div");
  div.className="song";
  div.innerHTML=`${s.n}
  <div>
  <button class="play" onclick="playSong(${i})">▶</button>
  <button class="stop" onclick="player.pause()">⏸</button>
  </div>`;
  list.appendChild(div);
});

/* تشغيل تلقائي */
player.onended=()=>{
  index++;
  if(index<songs.length){
    playSong(index);
  }
};

function playAll(){
  index=0;
  playSong(index);
}
function stopAll(){
  player.pause();
  player.currentTime=0;
}

</script>

</body>
</html>
