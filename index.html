<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FINAL BOSS XAT SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Tahoma;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== login ===== */
#login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  z-index:999;
}

.login-box{
  width:300px;
  padding:20px;
  border:1px solid #00f5ff;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 30px #00c3ff33;
}

.login-box input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:none;
  color:#fff;
  text-align:center;
}

.login-box button{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#00c3ff;
  border:none;
  cursor:pointer;
}

/* ===== main ===== */
.banner{
  width:728px;
  height:200px;
  position:relative;
  overflow:hidden;
  border-radius:16px;
  background:radial-gradient(circle,#0a0a0a,#000);
  box-shadow:0 0 60px rgba(0,255,255,0.1);
}

/* glow */
.glow{
  position:absolute;
  width:600px;
  height:600px;
  right:-200px;
  top:-200px;
  background:radial-gradient(circle,rgba(0,255,255,0.15),transparent 70%);
  filter:blur(80px);
}

/* side dark */
.left,.right{
  position:absolute;
  width:55%;
  height:100%;
  top:0;
}
.left{left:0;background:linear-gradient(to right,#000 40%,transparent);}
.right{right:0;background:linear-gradient(to left,#000 40%,transparent);}

/* content */
.content{
  position:absolute;
  left:40px;
  top:50%;
  transform:translateY(-50%);
}

.name{
  color:#fff;
  font-size:56px;
  font-weight:900;
  text-shadow:0 0 20px #00f5ff,0 0 40px #00c3ff;
}

.sign{
  color:#777;
  font-size:12px;
  letter-spacing:5px;
}

/* ===== AI STATUS ===== */
.status{
  position:absolute;
  top:10px;
  left:40px;
  color:#00f5ff;
  font-size:11px;
}

/* ===== canvas visualizer ===== */
canvas{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:60px;
}

/* ===== radio ===== */
.radio{
  position:absolute;
  bottom:10px;
  right:10px;
}

.radio button{
  padding:5px 10px;
  border:none;
  border-radius:20px;
  background:#00f5ff33;
  color:#fff;
  cursor:pointer;
}

/* ===== songs ===== */
.songs{
  position:absolute;
  right:10px;
  top:10px;
  width:260px;
  height:180px;
  overflow:auto;
}

.song{
  display:flex;
  justify-content:space-between;
  padding:4px;
  margin:3px 0;
  background:#00f5ff11;
  color:#fff;
  font-size:10px;
}

.song button{
  border:none;
  padding:3px 5px;
}

.play{background:#00f5ff}
.stop{background:#ff4d4d}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h3>FINAL BOSS LOGIN</h3>
<input id="pass" placeholder="password">
<button onclick="check()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div class="banner" id="main" style="display:none">

<div class="glow"></div>
<div class="left"></div>
<div class="right"></div>

<div class="status" id="status">AI STATUS: LOADING...</div>

<div class="content">
<div class="name">LEGEND</div>
<div class="sign">FINAL BOSS MODE</div>
</div>

<canvas id="cv"></canvas>

<div class="radio">
<button onclick="playRadio(0)">QURAN</button>
<button onclick="toggleRadio()">PLAY</button>
</div>

<div class="songs" id="songs"></div>

</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* LOGIN */
function check(){
if(pass.value==="106080"){
login.style.display="none";
main.style.display="block";
}else alert("wrong");
}

/* AI STATUS */
let states=[
"ONLINE",
"ANALYZING SOUND",
"LEGEND MODE ACTIVE",
"SYSTEM STABLE"
];

setInterval(()=>{
document.getElementById("status").innerText=
"AI STATUS: "+states[Math.floor(Math.random()*states.length)];
},2000);

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv"
];

let radio=document.getElementById("radio");
let on=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
on=true;
}

function toggleRadio(){
if(on){radio.pause();on=false;}
else{radio.play();on=true;}
}

/* SONGS */
let songs=[
["01","https://j.top4top.io/m_3769le8x51.mp3"],
["02","https://k.top4top.io/m_3769enq6z2.mp3"],
["03","https://l.top4top.io/m_3769auk3d3.mp3"],
["04","https://a.top4top.io/m_3769kdadn4.mp3"],
["05","https://b.top4top.io/m_3769kg8sd5.mp3"],
["06","https://c.top4top.io/m_3769ien0c6.mp3"],
["07","https://d.top4top.io/m_3769yw3257.mp3"],
["08","https://e.top4top.io/m_3769yb3k29.mp3"],
["09","https://f.top4top.io/m_37690zriz10.mp3"],
["10","https://b.top4top.io/m_3769lxi681.mp3"],
["11","https://c.top4top.io/m_3769g0kg52.mp3"],
["12","https://d.top4top.io/m_3769xz8mi3.mp3"],
["13","https://e.top4top.io/m_3769o93s34.mp3"],
["14","https://f.top4top.io/m_3769c3tql5.mp3"],
["15","https://g.top4top.io/m_3769r7bcu6.mp3"],
["16","https://l.top4top.io/m_3769p7dkd1.mp3"],
["17","https://a.top4top.io/m_37697muuj2.mp3"],
["18","https://b.top4top.io/m_3769i9yd13.mp3"],
["19","https://c.top4top.io/m_3769ou0bt4.mp3"],
["20","https://d.top4top.io/m_37697zirj5.mp3"],
["21","https://e.top4top.io/m_3769rnmrk6.mp3"],
["22","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let box=document.getElementById("songs");
let player=document.getElementById("player");

songs.forEach(s=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
<button class="stop" onclick="player.pause()">⏹</button>
</div>`;
box.appendChild(div);
});

/* VISUALIZER (simple canvas waves) */
let c=document.getElementById("cv");
let ctx=c.getContext("2d");
c.width=728;
c.height=60;

function draw(){
ctx.clearRect(0,0,c.width,c.height);
for(let i=0;i<40;i++){
let h=Math.random()*40;
ctx.fillStyle="#00f5ff";
ctx.fillRect(i*18,60-h,5,h);
}
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
