<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - BY RAMY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#010514,#020617);
  color:#fff;
}

canvas{position:fixed;inset:0;z-index:-2}

/* LOGIN */
.login{
  position:fixed;inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  z-index:50;
}
.login-box{
  width:300px;
  padding:18px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
}
.login-box input{
  width:100%;
  margin:8px 0;
  padding:9px;
  background:#0f172a;
  border:none;
  color:#fff;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:9px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  border:none;
  color:#fff;
  border-radius:8px;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:8px 15px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.4);
  z-index:10;
}

/* ONLINE */
.status{
  color:#00f5ff;
  font-weight:700;
  text-shadow:0 0 10px #00f5ff;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{opacity:.6}
  to{opacity:1}
}

/* BY RAMY */
.brand{
  font-weight:700;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:move 3s linear infinite;
}

@keyframes move{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* MAIN */
.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:80px;
}

.profile{
  width:900px;
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border-radius:20px;
  padding:20px;
}

/* TOP */
.top{display:flex;gap:15px;align-items:center}
.top img{width:100px;border-radius:50%;border:2px solid #00c3ff}
.name{font-size:30px;color:#4fc3ff;font-weight:700}

/* RADIO */
.radio-box{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.radio-btn{
  padding:6px 12px;
  background:linear-gradient(45deg,#00c3ff,#1e3a8a);
  border:none;border-radius:20px;
  color:#fff;
  cursor:pointer;
}

/* LINKS */
.world{
  display:block;
  margin-top:8px;
  padding:10px;
  background:rgba(0,195,255,0.1);
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

/* PLAYER */
#winamp{
  margin-top:10px;
  padding:10px;
  border-top:1px solid rgba(0,195,255,0.3);
}

.artist{
  text-align:center;
  font-size:22px;
  color:#00c3ff;
  font-weight:700;
}

/* 🎵 ONLY SONGS HOVER */
.song{
  display:flex;
  justify-content:space-between;
  background:rgba(0,195,255,0.1);
  margin:3px 0;
  padding:6px;
  border-radius:8px;
  font-size:12px;
  transition:.2s;
}

/* 👇 التكبير للأغاني فقط */
.song:hover{
  transform:scale(1.06);
  background:rgba(0,195,255,0.25);
}

/* BUTTONS */
.song button{
  border:none;
  padding:4px 8px;
  border-radius:6px;
  cursor:pointer;
}
.play{background:#00c3ff;color:#000}
.stop{background:#ff4d4d;color:#fff}

/* TOOLTIP */
.tooltip{
  position:fixed;
  background:rgba(0,0,0,0.8);
  color:#00f5ff;
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  pointer-events:none;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<div class="tooltip" id="tooltip"></div>

<!-- RADIO (FIXED WORKING) -->
<audio id="radio1" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="radio2" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
<audio id="radio3" src="https://stream.zeno.fm/w7atxdpk1pdvv"></audio>
<audio id="radio4" src="https://stream.zeno.fm/hswv0qwu7vgtv"></audio>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="topbar">
  <div class="status" id="status">⚡ OFFLINE</div>
  <div class="brand">BY RAMY</div>
</div>

<div class="container">
<div class="profile">

<div class="top">
<img src="https://xatimg.com/image/RKP5IrStF45l.png">

<div>
<div class="name">Ramy</div>

<div class="radio-box">
<button class="radio-btn" onclick="playRadio(1)">🎧 قرآن</button>
<button class="radio-btn" onclick="playRadio(2)">🎶 ميلودي</button>
<button class="radio-btn" onclick="playRadio(3)">🎤 حماقي</button>
<button class="radio-btn" onclick="playRadio(4)">🔥 منوعات</button>
</div>

</div>
</div>

<a class="world" href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a class="world" href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a class="world" href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a class="world" href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>

<div id="winamp">
<div class="artist">🎤 ليل المحمدي</div>
<div id="list"></div>
</div>

</div>
</div>

<script>

/* LOGIN FIX + ONLINE */
function enter(){
  if(password.value==="106080"){
    login.style.display="none";
    status.innerText="⚡ ONLINE";
  }
}
password.addEventListener("keydown",e=>{
  if(e.key==="Enter") enter();
});

/* RADIO FIX (WORKING) */
let radios=[
document.getElementById("radio1"),
document.getElementById("radio2"),
document.getElementById("radio3"),
document.getElementById("radio4")
];

let current=null;

function playRadio(i){
  radios.forEach(r=>r.pause());
  current=radios[i-1];
  current.play();
}

/* TOOLTIP ONLY FOR SONGS */
const tooltip=document.getElementById("tooltip");

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let list=document.getElementById("list");
let player=new Audio();

songs.forEach(s=>{
  let div=document.createElement("div");
  div.className="song";

  div.innerHTML=`
  ${s[0]}
  <div>
    <button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
    <button class="stop" onclick="player.pause()">⏹</button>
  </div>`;

  /* TOOLTIP ONLY SONGS */
  div.addEventListener("mousemove",(e)=>{
    tooltip.style.display="block";
    tooltip.innerText=s[0];
    tooltip.style.left=e.clientX+"px";
    tooltip.style.top=e.clientY+"px";
  });

  div.addEventListener("mouseleave",()=>{
    tooltip.style.display="none";
  });

  list.appendChild(div);
});

</script>

</body>
</html>
