<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY HACK SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:260px 1fr;
  height:100vh;
  gap:10px;
  padding:10px;
}

/* PANELS */
.panel{
  background:rgba(0,0,0,0.6);
  border:1px solid #00f5ff33;
  box-shadow:0 0 20px #00f5ff22;
  border-radius:10px;
  padding:10px;
  overflow:auto;
}

/* ================= BOOT ================= */
.boot{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.loader{
  width:80px;
  height:80px;
}

.bar{
  width:80%;
  height:6px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.bar span{
  display:block;
  height:100%;
  width:0;
  background:#00f5ff;
  animation:load 3s forwards;
}

@keyframes load{
  to{width:100%}
}

/* ================= TERMINAL ================= */
.terminal{
  color:#00ff00;
  font-family:monospace;
  display:flex;
  flex-direction:column;
}

.hack-container{
  display:flex;
  align-items:center;
  gap:10px;
}

.hacker-img{
  width:70px;
  height:70px;
  filter:drop-shadow(0 0 10px #00ff00);
}

.mini-bar{
  margin-top:10px;
  height:5px;
  background:#111;
}

.mini-bar span{
  display:block;
  height:100%;
  width:0;
  background:#00ff00;
  animation:load 3s forwards;
}

/* ================= LOGIN ================= */
.login-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.lock-img{
  width:80px;
  filter:drop-shadow(0 0 15px #66faff);
}

.login-box input{
  width:80%;
  padding:10px;
  background:#111;
  border:1px solid #66faff;
  color:#66faff;
  text-align:center;
}

.login-box button{
  margin-top:10px;
  padding:8px 15px;
  background:#66faff;
  border:none;
  cursor:pointer;
}

/* ================= PROFILE ================= */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:15px;
  gap:8px;
}

.avatar{
  width:130px;
  height:130px;
  border-radius:50%;
  border:2px solid #00f5ff;
  box-shadow:0 0 20px #00f5ff;
}

.name{
  font-size:32px;
  color:#00f5ff;
  text-shadow:0 0 15px #00f5ff;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{opacity:0.4}
  to{opacity:1}
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
}

.radio-btn{
  background:#00f5ff;
  border:none;
  padding:6px;
  font-size:11px;
  cursor:pointer;
}

.radio-box{
  padding:6px;
  border:1px solid #00f5ff;
  cursor:pointer;
  text-align:center;
  width:80%;
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.links a{
  color:#00ffcc;
  text-decoration:none;
  font-size:12px;
}

/* ================= SONGS ================= */
.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:5px 0;
  background:#00f5ff11;
  border-radius:6px;
  font-size:12px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* ================= GLOBAL PLAYER ================= */
.player{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:380px;
  background:#000;
  border:1px solid #00f5ff;
  padding:10px;
  display:flex;
  align-items:center;
  gap:8px;
  border-radius:10px;
}

.player button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

.player input[type=range]{
  width:80px;
}

.progress{
  flex:1;
  height:5px;
  background:#111;
}

#bar{
  height:100%;
  width:0%;
  background:#00ffcc;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 BOOT -->
<div class="panel boot">
  <h3>BOOTING RAMY SYSTEM</h3>
  <img class="loader" src="https://i.gifer.com/ZZ5H.gif">
  <div class="bar"><span></span></div>
</div>

<!-- 2 TERMINAL -->
<div class="panel terminal">
  <div class="hack-container">
    <img class="hacker-img" src="https://i.imgur.com/3ZQ3Z4M.png">
    <div>
      [+] SYSTEM ONLINE<br>
      [+] FIREWALL DOWN<br>
      [+] ROOT ACCESS ✔
    </div>
  </div>
  <div class="mini-bar"><span></span></div>
</div>

<!-- 3 LOGIN -->
<div class="panel login-box">
  <h3>ENTER PASSWORD</h3>
  <img class="lock-img" src="https://cdn-icons-png.flaticon.com/512/2911/2911230.png">
  <input type="password" id="pass">
  <button onclick="check()">ACCESS</button>
</div>

<!-- 4 PROFILE -->
<div class="panel profile">

<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">

<div class="name">RAMY</div>

<div class="radio">
<button class="radio-btn" onclick="playRadio(0)">🎧 قرآن</button>
<button class="radio-btn" onclick="playRadio(1)">🎶 ميلودي</button>
<button class="radio-btn" onclick="playRadio(2)">🎤 حماقي</button>
<button class="radio-btn" onclick="playRadio(3)">🔥 منوعات</button>
</div>

<div class="radio-box" onclick="toggleRadio()">▶ / ⏸</div>

<div class="links">
<a href="https://xat.com/2ra">2ra Chat</a>
<a href="https://xat.com/7reqa">7reqa Chat</a>
<a href="https://xat.com/trade">Trade</a>
<a href="https://xat.com/cambio">Cambio</a>
</div>

</div>

<!-- 5 SONGS -->
<div class="panel" id="left"></div>

<!-- 6 SONGS -->
<div class="panel" id="right"></div>

</div>

<!-- GLOBAL PLAYER -->
<div class="player">

<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶/⏸</button>
<button onclick="next()">⏭</button>

<input type="range" min="0" max="1" step="0.1" onchange="vol(this.value)">

<div class="progress"><div id="bar"></div></div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

/* LOGIN */
function check(){
if(pass.value==="106080") alert("ACCESS GRANTED");
else alert("WRONG PASSWORD");
}

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let rplay=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
rplay=true;
}

function toggleRadio(){
if(!radio.src) radio.src=radios[0];
if(rplay){radio.pause();rplay=false;}
else{radio.play();rplay=true;}
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");
let index=0;

/* render */
let left=document.getElementById("left");
let right=document.getElementById("right");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<button onclick="playSong('${s[1]}')">▶</button>
`;
(i<11?left:right).appendChild(div);
});

/* player */
function playSong(url){
audio.src=url;
audio.play();
index=songs.findIndex(s=>s[1]===url);
}

function next(){
index=(index+1)%songs.length;
playSong(songs[index][1]);
}

function prev(){
index=(index-1+songs.length)%songs.length;
playSong(songs[index][1]);
}

function toggle(){
audio.paused?audio.play():audio.pause();
}

function vol(v){
audio.volume=v;
}

/* progress */
audio.ontimeupdate=function(){
document.getElementById("bar").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

</script>

</body>
</html>
