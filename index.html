<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile{display:flex;flex-direction:column;gap:10px;}

.top-profile{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.avatar{
  width:90px;height:90px;border-radius:50%;
  border:2px solid #00f5ff;
}

.glow-name{
  font-size:28px;
  animation:pulse 1.5s infinite;
  text-shadow:0 0 10px #00f5ff;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:0.4}
  100%{opacity:1}
}

.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
}

.player{display:flex;flex-direction:column;gap:6px;align-items:center;}

.seek{width:100%;height:6px;background:#111;cursor:pointer;}
#fill{height:100%;width:0%;background:#00ffcc;}

.hidden{display:none;}
audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<div class="panel hacker-box">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<div class="panel hacker-box">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- PASSWORD -->
<div class="panel hacker-box" id="lockBox">

<img src="https://img.pikbest.com/backgrounds/20250126/guarding-your-digital-life-power-of-passwords-smarter-password-practices_11452980.jpg!f305cw">

<div id="lock" style="
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:rgba(0,0,0,0.7);">

<input type="password" id="pass" placeholder="ENTER PASSWORD">
<button onclick="check()">UNLOCK</button>

</div>
</div>

<!-- 4 -->
<div class="panel profile hidden" id="box4">
<div class="top-profile">
<div class="glow-name">RAMY</div>
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
</div>
</div>

<!-- 5 -->
<div class="panel hidden" id="box5">
<div class="player">
<div id="title">NO SONG</div>
<button onclick="toggle()">▶ / ⏸</button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>
</div>

<div id="list1"></div>
</div>

<!-- 6 -->
<div class="panel hidden" id="box6">
<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>

<script>

let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],

["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");
let list1=document.getElementById("list1");
let list2=document.getElementById("list2");

/* تقسيم 11 / 11 */
songs.forEach((s,i)=>{
let div=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<11) list1.innerHTML+=div;
else list2.innerHTML+=div;
});

function play(i){
audio.src=songs[i][1];
audio.play();
document.getElementById("title").innerText=songs[i][0];
}

function toggle(){
audio.paused?audio.play():audio.pause();
}

function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

/* PASSWORD FIX */
function check(){
if(pass.value==="106080"){
document.getElementById("lockBox").style.display="none"; // 🔥 حل التعليق
document.getElementById("box4").classList.remove("hidden");
document.getElementById("box5").classList.remove("hidden");
document.getElementById("box6").classList.remove("hidden");
}else{
alert("WRONG PASSWORD");
}
}

/* ENTER */
pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

</script>

</body>
</html>
