<!-- ========== AUDIO ========== -->
<audio id="radio"></audio>

<!-- ========== SCRIPT ========== -->
<script>

let radios = [
  "https://stream.radiojar.com/8s5u5tpdtwzuv",
  "https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
  "https://stream.zeno.fm/w7atxdpk1pdvv",
  "https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio = document.getElementById("radio");
let isPlaying = false;

function playRadio(i){
  radio.src = radios[i];
  radio.play();
  isPlaying = true;
}

function toggleRadio(){

  if(!radio.src){
    radio.src = radios[0];
  }

  if(isPlaying){
    radio.pause();
    isPlaying = false;
  }else{
    radio.play();
    isPlaying = true;
  }

}

</script>

<!-- ========== STYLES ========== -->
<style>

.radio{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin-bottom:10px;
}

.radio-btn{
  background:#00f5ff;
  border:none;
  padding:6px 8px;
  font-size:11px;
  cursor:pointer;
  box-shadow:0 0 10px #00f5ff55;
}

.radio-box{
  text-align:center;
  padding:8px;
  margin:5px 0;
  background:#111;
  color:#00f5ff;
  border:1px solid #00f5ff;
  cursor:pointer;
  box-shadow:0 0 10px #00f5ff33;
  font-size:12px;
  transition:0.3s;
}

.radio-box:hover{
  box-shadow:0 0 20px #00f5ff;
  transform:scale(1.02);
}

.links{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:10px;
}

.links a{
  color:#00ffcc;
  text-decoration:none;
  font-size:12px;
  text-shadow:0 0 5px #00ffcc;
}

</style>
