<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
  transition:0.3s;
}

/* ===== PROFILE ===== */
.profile{text-align:center;}

.avatar{
  width:130px;
  height:130px;
  border-radius:50%;
  border:3px solid #00f5ff;
  box-shadow:0 0 20px #00f5ff;
}

/* NAME */
.glow-name{
  font-size:36px;
  font-weight:bold;
  background:linear-gradient(45deg,#00f5ff,#00ffcc,#00f5ff);
  -webkit-background-clip:text;
  color:transparent;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;transform:scale(1);}
50%{opacity:0.4;transform:scale(1.1);}
100%{opacity:1;transform:scale(1);}
}

/* RADIO */
.radio{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:10px;
}

.radio button{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00f5ff11;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.radio button:hover{
  transform:scale(1.08);
  background:#00f5ff33;
  box-shadow:0 0 15px #00f5ff;
}

.radio-toggle{
  margin-top:8px;
  padding:10px;
  width:100%;
  background:linear-gradient(45deg,#00f5ff,#00ffcc);
  border:none;
  cursor:pointer;
  border-radius:8px;
}

/* LINKS */
.links a{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:5px 0;
  background:#00f5ff11;
  border-radius:8px;
  color:#00ffcc;
  text-decoration:none;
  transition:0.3s;
}

.links a:hover{
  transform:scale(1.08);
  background:#00f5ff33;
  box-shadow:0 0 15px #00ffcc;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
}

.song button{
  background:#00f5ff;
  border:none;
}

/* PLAYER */
.player{
  text-align:center;
}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.hidden{display:none;}
audio{display:none;}
</style>
</head>

<body>

<div class="dashboard">

audio.ontimeupdate=function(){

</script>
