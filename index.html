<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* 🇪🇬 BACKGROUND FLAG */
.egypt-bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background:linear-gradient(to bottom,#ce1126 0%,#ce1126 33%,#ffffff 33%,#ffffff 66%,#000000 66%,#000000 100%);
  opacity:0.08;
}

/* 🎤 MAIN TITLE */
.main-title{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;

  font-size:34px;
  font-weight:900;

  background:linear-gradient(90deg,#00f5ff,#ffffff,#ff0000,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:titleGlow 2.5s infinite;
}

@keyframes titleGlow{
  0%,100%{opacity:1;transform:translateX(-50%) scale(1)}
  50%{opacity:0.4;transform:translateX(-50%) scale(1.08)}
}

/* 🎯 BANNER */
.banner{
  position:fixed;
  top:55px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
}

.banner-text{
  font-size:22px;
  font-weight:900;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:bannerGlow 3s infinite;
}

@keyframes bannerGlow{
  0%,100%{opacity:1}
  50%{opacity:0.5}
}

/* LOGIN GLASS */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000000dd;
  z-index:999;
}

.login-box{
  width:320px;
  padding:25px;
  border-radius:20px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);

  border:1px solid rgba(0,195,255,0.25);

  box-shadow:0 0 60px #00f5ff22;

  text-align:center;

  animation:boxFloat 4s infinite ease-in-out;
}

@keyframes boxFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.login-box input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#020617;
  color:#fff;
  text-align:center;
}

.login-box button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c3ff,#1e3a8a,#a855f7);
  color:#fff;
  cursor:pointer;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#00000066;
}

.status{
  color:#00f5ff;
  font-weight:bold;
  animation:blink 1.5s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

.brand{
  font-weight:bold;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* MAIN BOX */
.box{
  width:900px;
  margin:100px auto;
  background:#ffffff0a;
  padding:15px;
  border-radius:15px;
}

/* PROFILE */
.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #00c3ff;
  animation:avatarPulse 2s infinite;
}

@keyframes avatarPulse{
  0%,100%{
    box-shadow:0 0 10px #00c3ff,0 0 25px #00f5ff;
  }
  50%{
    box-shadow:0 0 0px #00c3ff,0 0 40px #00f5ff;
    transform:scale(1.05);
  }
}

.name{
  font-size:44px;
  font-weight:900;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:ramyGlow 2s infinite;
}

@keyframes ramyGlow{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.radio-btn{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  background:#00c3ff;
  cursor:pointer;
}

.radio-box{
  margin-top:10px;
  padding:10px;
  background:#00c3ff22;
  border-radius:12px;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:block;
  margin:5px 0;
  padding:8px;
  background:#00c3ff22;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
}

/* SONGS */
.wrap{display:flex;gap:10px;margin-top:10px}
.col{flex:1}

.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00c3ff22;
  border-radius:8px;
  font-size:12px;
}

.song button{
  border:none;
  padding:3px 6px;
  border-radius:6px;
}
.play{background:#00c3ff}
.stop{background:#ff4d4d}

</style>
</head>

<body>

<!-- 🇪🇬 BG -->
<div class="egypt-bg"></div>

<!-- 🎤 TITLE -->
<div class="main-title">🎤 LIL EL MOHAMEDY</div>

<!-- 🎯 BANNER -->
<div class="banner">
  <div class="banner-text">RAMY PROFILE SYSTEM</div>
</div>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h3>🔐 PASSWORD</h3>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="check()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="topbar">
<div class="status">⚡ ONLINE</div>
<div class="brand">BY RAMY</div>
</div>

<div class="box">

<div class="top">
<img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">
<div class="name">RAMY</div>
</div>

<div class="radio">
<button class="radio-btn" onclick="playRadio(0)">🎧 قرآن</button>
<button class="radio-btn" onclick="playRadio(1)">🎶 ميلودي</button>
<button class="radio-btn" onclick="playRadio(2)">🎤 حماقي</button>
<button class="radio-btn" onclick="playRadio(3)">🔥 منوعات</button>
</div>

<div class="radio-box" onclick="toggleRadio()">▶ / ⏸ تشغيل الراديو</div>

<div class="links">
<a href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
</div>

<div class="wrap">
<div class="col" id="left"></div>
<div class="col" id="right"></div>
</div>

</div>
</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

function check(){
if(pass.value==="106080"){
login.style.display="none";
main.style.display="block";
}else alert("Wrong Password");
}

pass.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let isRadio=false;

function playRadio(i){
radio.pause();
radio.src=radios[i];
radio.play();
isRadio=true;
}

function toggleRadio(){
if(!radio.src) radio.src=radios[0];

if(isRadio){
radio.pause();
isRadio=false;
}else{
radio.play();
isRadio=true;
}
}

let songs=[
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let left=document.getElementById("left");
let right=document.getElementById("right");
let player=document.getElementById("player");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`
${s[0]}
<div>
<button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
<button class="stop" onclick="player.pause()">⏹</button>
</div>`;
(i%2?right:left).appendChild(div);
});

</script>

</body>
</html>
