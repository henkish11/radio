<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
  transition:0.3s;
}

/* HOVER */
.panel:hover,
.song:hover,
.radio button:hover,
.links a:hover{
  transform:scale(1.05);
}

/* HACKER BOX */
.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PROFILE */
.profile{text-align:center;}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.glow-name{
  font-size:32px;
  animation:pulse 1.5s infinite;
  text-shadow:0 0 10px #00f5ff;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:0.4}
  100%{opacity:1}
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
}

/* PLAYER (BOX 5) */
.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.seek{
  width:95%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:90%;
}

/* VOLUME BOX (BOX 6) */
.volume-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.volume-box button{
  background:#00f5ff;
  border:none;
  padding:5px;
  cursor:pointer;
}

audio{display:none;}
.hidden{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel hacker-box">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- 2 -->
<div class="panel hacker-box">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp">
</div>

<!-- 3 LOCK -->
<div class="panel hacker-box">
<img src="https://img.pikbest.com/backgrounds/20250126/guarding-your-digital-life-power-of-passwords-smarter-password-practices_11452980.jpg!f305cw">

<div class="lock" id="lock">
<div>🔐 ENTER PASSWORD</div>
<input type="password" id="pass">
<button onclick="check()">UNLOCK</button>
</div>
</div>

<!-- 4 PROFILE -->
<div class="panel profile hidden" id="box4">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="glow-name">RAMY</div>
</div>

<!-- 5 PLAYER + SEEK -->
<div class="panel hidden" id="box5">

<div class="player">
<div id="title">NO SONG</div>

<button onclick="toggle()">▶ / ⏸</button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>

<input class="volume" type="range" min="0" max="1" step="0.1"
oninput="audio.volume=this.value">

</div>

<div id="list1"></div>
</div>

<!-- 6 VOLUME CONTROL -->
<div class="panel hidden" id="box6">

<div class="volume-box">
<h4>🔊 SOUND CONTROL</h4>

<button onclick="audio.volume=Math.min(audio.volume+0.1,1)">➕ رفع الصوت</button>
<button onclick="audio.volume=Math.max(audio.volume-0.1,0)">➖ خفض الصوت</button>

<input type="range" min="0" max="1" step="0.1"
oninput="audio.volume=this.value">

</div>

<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>

<script>

let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"]
];

let audio=document.getElementById("audio");
let index=0;

let list1=document.getElementById("list1");
let list2=document.getElementById("list2");

/* SONG LIST */
songs.forEach((s,i)=>{
let div=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<3) list1.innerHTML+=div;
else list2.innerHTML+=div;
});

/* PLAY */
function play(i){
audio.src=songs[i][1];
audio.play();
index=i;
document.getElementById("title").innerText=songs[i][0];
}

/* PLAYER */
function toggle(){
audio.paused?audio.play():audio.pause();
}

/* SEEK BAR */
function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

/* PROGRESS */
audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

/* PASSWORD */
function check(){
if(pass.value==="106080"){
document.getElementById("lock").style.display="none";
document.getElementById("box4").classList.remove("hidden");
document.getElementById("box5").classList.remove("hidden");
document.getElementById("box6").classList.remove("hidden");
}else alert("WRONG PASSWORD");
}

</script>

</body>
</html>
