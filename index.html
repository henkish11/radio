<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
}

/* GLOW TEXT */
.glow{
  text-shadow:0 0 8px #00f5ff,0 0 20px #00ffcc;
  color:#00f5ff;
}

/* PROFILE */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* 🔥 صورة أصغر جدًا */
.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #00f5ff;
  box-shadow:0 0 15px #00f5ff;
}

/* الاسم */
.name{
  margin-top:8px;
  font-size:26px;
  font-weight:bold;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  margin:4px 0;
  background:#00f5ff11;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player{
  text-align:center;
}

.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:100%;
  margin-top:5px;
}

/* BUTTONS */
.btn{
  background:#00f5ff;
  border:none;
  padding:6px;
  margin:3px;
  cursor:pointer;
  font-weight:bold;
}

/* LINKS */
.links a{
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin:4px 0;
  text-decoration:none;
  color:#00ffcc;
  background:#00f5ff11;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 PROFILE -->
<div class="panel profile glow">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">

</div>

<!-- 2 -->
<div class="panel glow">
HACK SYSTEM ACTIVE
</div>

<div class="panel glow">
SECURE CORE ONLINE

<div class="panel glow">

</body>
</html>
