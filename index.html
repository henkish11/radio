<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1f,#05060a);
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
  transition:0.3s;
}

.panel:hover,
.song:hover,
.radio button:hover,
.links a:hover{
  transform:scale(1.03);
}

/* BOX 4 */
.profile{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.glow-name{
  font-size:24px;
  text-shadow:0 0 10px #00f5ff;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  50%{opacity:0.5}
}

/* RADIO */
.radio button{
  background:#00f5ff22;
  border:1px solid #00f5ff55;
  color:#00f5ff;
  padding:8px;
  margin:3px 0;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin:3px 0;
  background:#00f5ff11;
  text-decoration:none;
  color:#00ffcc;
}

/* SONGS */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.seek{
  width:100%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:100%;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG" style="width:100%;height:100%;object-fit:cover;">
</div>

<!-- 2 -->
<div class="panel">
<img src="https://img.pikbest.com/wp/202345/hacker-skeleton-working-on-laptop-dark-background_9581815.jpg!w700wp" style="width:100%;height:100%;object-fit:cover;">
</div>

<!-- 3 -->
<div class="panel">
<img src="https://img.pikbest.com/backgrounds/20250126/guarding-your-digital-life-power-of-passwords-smarter-password-practices_11452980.jpg!f305cw" style="width:100%;height:100%;object-fit:cover;">
</div>

<!-- 4 RADIO + LINKS -->
<div class="panel profile">

<div class="glow-name">RAMY</div>

<div class="radio">
<button onclick="playRadio(0)">🎧 قرآن</button>
<button onclick="playRadio(1)">🎶 ميلودي</button>
<button onclick="playRadio(2)">🎤 حماقي</button>
<button onclick="playRadio(3)">🔥 منوعات</button>
</div>

<button onclick="toggleRadio()" style="background:#00f5ff;border:none;padding:6px;">
▶ / ⏸ RADIO
</button>

<div class="links">
<a href="#">2RA CHAT <span>></span></a>
<a href="#">7REQA CHAT <span>></span></a>
<a href="#">TRADE <span>></span></a>
<a href="#">CAMBIO <span>></span></a>
</div>

</div>

<!-- 5 SONGS 1 -->
<div class="panel" id="box5">
<div id="list1"></div>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>

<input class="volume" type="range" min="0" max="1" step="0.1" oninput="audio.volume=this.value">

<button onclick="toggle()">▶ / ⏸</button>
<div id="title">NO SONG</div>
</div>

<!-- 6 SONGS 2 -->
<div class="panel" id="box6">
<div id="list2"></div>

<input class="volume" type="range" min="0" max="1" step="0.1" oninput="audio.volume=this.value">
</div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

let radio=document.getElementById("radio");

let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

function playRadio(i){
radio.src=radios[i];
radio.play();
}

function toggleRadio(){
radio.paused?radio.play():radio.pause();
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=document.getElementById("audio");

songs.forEach((s,i)=>{
let div=`<div class="song">${s[0]} <button onclick="play(${i})">▶</button></div>`;
if(i<11) document.getElementById("list1").innerHTML+=div;
else document.getElementById("list2").innerHTML+=div;
});

function play(i){
audio.src=songs[i][1];
audio.play();
document.getElementById("title").innerText=songs[i][0];
}

function toggle(){
audio.paused?audio.play():audio.pause();
}

function seek(e){
let p=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=p*audio.duration;
}

audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

</script>

</body>
</html>
