<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OMNIVERSE MODE</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:monospace;
  color:#66ffcc;
}

/* ===== BACKGROUND LAYERS ===== */
canvas{
  position:fixed;
  top:0;
  left:0;
}

/* glow fog */
.fog{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 50% 50%,rgba(0,255,200,0.08),transparent 60%);
  z-index:1;
}

/* SCANLINES */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,255,200,0.04),
    rgba(0,255,200,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  z-index:2;
  pointer-events:none;
}

/* MAIN CORE */
.core{
  position:relative;
  z-index:3;
  width:850px;
  height:470px;
  margin:auto;
  top:50%;
  transform:translateY(-50%);
  border:1px solid #66ffcc;
  box-shadow:0 0 60px rgba(0,255,200,0.25);
  background:rgba(0,0,0,0.85);
  padding:15px;
}

/* HEADER */
.header{
  font-size:12px;
  margin-bottom:10px;
}

/* AI PANEL */
.ai{
  position:absolute;
  top:10px;
  right:10px;
  font-size:11px;
  color:#66ffcc;
}

/* LOG */
#log{
  font-size:11px;
  height:140px;
  overflow:hidden;
}

/* BUTTONS */
button{
  background:transparent;
  border:1px solid #66ffcc;
  color:#66ffcc;
  padding:5px 10px;
  cursor:pointer;
  font-family:monospace;
}
button:hover{
  background:#66ffcc22;
}

/* SONGS */
.songs{
  margin-top:10px;
  height:180px;
  overflow:auto;
  border-top:1px solid #66ffcc;
  padding-top:10px;
}

.song{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  padding:3px;
  border-bottom:1px dashed #66ffcc55;
}

/* NETWORK MAP */
.map{
  position:absolute;
  left:10px;
  bottom:10px;
  width:200px;
  height:120px;
  border:1px solid #66ffcc33;
  overflow:hidden;
}

.node{
  position:absolute;
  width:6px;
  height:6px;
  background:#66ffcc;
  border-radius:50%;
  animation:move 4s infinite;
}

@keyframes move{
  0%{transform:translate(0,0)}
  50%{transform:translate(80px,40px)}
  100%{transform:translate(0,0)}
}

/* CURSOR */
.cursor{
  display:inline-block;
  width:8px;
  height:12px;
  background:#66ffcc;
  animation:blink .7s infinite;
}
@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="fog"></div>

<div class="core">

<div class="header">
> OMNIVERSE CORE ONLINE<br>
> ALL SYSTEMS SYNCHRONIZED<br>
> DIMENSION LINK ACTIVE
</div>

<div class="ai" id="ai">AI: INITIALIZING OMNIBRAIN...</div>

<div id="log"></div>

<div style="margin-top:10px;">
<button onclick="radioOn()">RADIO</button>
<button onclick="radioStop()">STOP</button>
</div>

<div class="songs" id="songs"></div>

<div style="margin-top:10px;">
omniverse@root:<span class="cursor"></span>
</div>

<!-- network map -->
<div class="map" id="map"></div>

</div>

<audio id="radio"></audio>
<audio id="player"></audio>

<script>

/* ===== MATRIX BACKGROUND ===== */
const c=document.getElementById("bg");
const x=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let chars="01OMNIVERSEAI$#@";
chars=chars.split("");

let font=14;
let cols=c.width/font;
let drops=Array(cols).fill(1);

function draw(){
x.fillStyle="rgba(0,0,0,0.08)";
x.fillRect(0,0,c.width,c.height);

x.fillStyle="#66ffcc";
x.font=font+"px monospace";

for(let i=0;i<drops.length;i++){
let t=chars[Math.floor(Math.random()*chars.length)];
x.fillText(t,i*font,drops[i]*font);

if(drops[i]*font>c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,30);

/* ===== LOG SYSTEM ===== */
let log=document.getElementById("log");
let lines=[
"[OK] connecting universe nodes...",
"[OK] syncing AI layers...",
"[OK] stabilizing matrix field...",
"[OK] opening dimension bridge...",
"[OK] OMNIVERSE ACTIVE"
];

let i=0;
setInterval(()=>{
if(i<lines.length){
log.innerHTML+=lines[i]+"<br>";
i++;
}
},900);

/* ===== AI STATUS ===== */
let ai=document.getElementById("ai");

let states=[
"THINKING ACROSS DIMENSIONS",
"SCANNING ALL REALITIES",
"NEURAL OVERLOAD STABLE",
"OMNIVERSE RUNNING"
];

setInterval(()=>{
ai.innerText="AI: "+states[Math.floor(Math.random()*states.length)];
},2000);

/* ===== RADIO ===== */
let radio=document.getElementById("radio");

function radioOn(){
radio.src="https://stream.radiojar.com/8s5u5tpdtwzuv";
radio.play();
}

function radioStop(){
radio.pause();
}

/* ===== SONGS ===== */
let songs=[
["NODE_01","https://j.top4top.io/m_3769le8x51.mp3"],
["NODE_02","https://k.top4top.io/m_3769enq6z2.mp3"],
["NODE_03","https://l.top4top.io/m_3769auk3d3.mp3"]
];

let box=document.getElementById("songs");
let player=document.getElementById("player");

songs.forEach(s=>{
let d=document.createElement("div");
d.className="song";
d.innerHTML=`
${s[0]}
<button onclick="player.src='${s[1]}';player.play()">EXEC</button>
`;
box.appendChild(d);
});

/* ===== NETWORK MAP ===== */
let map=document.getElementById("map");

for(let i=0;i<6;i++){
let n=document.createElement("div");
n.className="node";
n.style.left=Math.random()*180+"px";
n.style.top=Math.random()*100+"px";
n.style.animationDelay=(Math.random()*2)+"s";
map.appendChild(n);
}

</script>

</body>
</html>
