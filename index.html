<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

/* HACKER BOX */
.hacker-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PROFILE */
.profile{text-align:center;}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.glow-name{
  font-size:32px;
  font-weight:bold;
  color:#00f5ff;
  animation:pulse 1.5s infinite;
  text-shadow:0 0 10px #00f5ff,0 0 20px #00f5ff;
}

@keyframes pulse{
  0%{opacity:1;transform:scale(1);}
  50%{opacity:0.4;transform:scale(1.1);}
  100%{opacity:1;transform:scale(1);}
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
}

.radio button{
  background:#00f5ff;
  border:none;
  padding:5px 8px;
  font-size:11px;
  cursor:pointer;
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:8px;
}

.links a{
  color:#00ffcc;
  text-decoration:none;
  padding:6px;
  background:#00f5ff11;
  border-radius:6px;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* LOCK */
.lock{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.lock input{
  padding:8px;
  text-align:center;
  background:#111;
  border:none;
  color:#00f5ff;
}

.lock button{
  padding:6px 10px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* PLAYER */
.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.seek{
  width:90%;
  height:6px;
  background:#111;
  cursor:pointer;
}

#fill{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.volume{
  width:90%;
}

.hidden{display:none;}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel hacker-box">
<img src="https://mf.b37mrtl.ru/media/pics/2023.04/article/643e76264c59b716106a1276.PNG">
</div>

<!-- 2 -->
<div class="panel hacker-box">

<button onclick="toggleRadio()" style="margin-top:5px;background:#00ffcc;border:none;padding:5px;cursor:pointer;">
▶ / ⏸
</button>

<div class="links">
<a href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>
</div>

</div>

<!-- 5 -->
<div class="panel hidden" id="box5">

<div class="player">
<div id="title">NO SONG</div>
<button onclick="toggle()">▶ / ⏸</button>

<div class="seek" onclick="seek(event)">
<div id="fill"></div>
</div>

<input class="volume" type="range" min="0" max="1" step="0.1" onchange="audio.volume=this.value">

</div>

<div id="list1"></div>

</div>

<!-- 6 -->
<div class="panel hidden" id="box6">
<div id="list2"></div>
</div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

/* RADIO */
let radio=document.getElementById("radio");

let audio=document.getElementById("audio");

for(let i=0;i<11;i++){
list1.innerHTML+=`<div class="song">${songs[i][0]} <button onclick="play(${i})">▶</button></div>`;
}

for(let i=11;i<songs.length;i++){
list2.innerHTML+=`<div class="song">${songs[i][0]} <button onclick="play(${i})">▶</button></div>`;
}

/* PLAY */
function play(i){
audio.src=songs[i][1];
audio.play();
index=i;
document.getElementById("title").innerText=songs[i][0];
}

/* TOGGLE */
function toggle(){
audio.paused?audio.play():audio.pause();
}

/* SEEK */
function seek(e){
let pos=e.offsetX/e.currentTarget.offsetWidth;
audio.currentTime=pos*audio.duration;
}

/* PROGRESS */
audio.ontimeupdate=function(){
document.getElementById("fill").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

/* PASSWORD */
function check(){
if(pass.value==="106080"){
document.getElementById("lock").style.display="none";
document.getElementById("box4").classList.remove("hidden");
document.getElementById("box5").classList.remove("hidden");

}

</script>

</body>
</html>
