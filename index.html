<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - BY RAMY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#010514,#020617);
  color:#fff;
}

canvas{position:fixed;inset:0;z-index:-2}

/* LOGIN */
.login{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);z-index:50
}
.login-box{
  width:300px;padding:18px;border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1)
}
.login-box input{
  width:100%;margin:8px 0;padding:9px;background:#0f172a;
  border:none;color:#fff;border-radius:8px
}
.login-box button{
  width:100%;padding:9px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  border:none;color:#fff;border-radius:8px
}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;
  padding:8px 15px;display:flex;justify-content:space-between;
  background:rgba(0,0,0,0.4);z-index:10
}
.status{color:#38bdf8}

/* MAIN */
.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:80px;
}

/* CARD */
.profile{
  width:900px;
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(18px);
  box-shadow:0 0 40px rgba(0,195,255,0.3);
}

/* TOP */
.top{display:flex;gap:15px;align-items:center}
.top img{
  width:100px;border-radius:50%;
  border:2px solid #00c3ff;
}
.name{
  font-size:30px;
  color:#4fc3ff;
  font-weight:700;
}

/* RADIO */
.radio-box{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}

.radio-btn{
  padding:6px 12px;
  background:linear-gradient(45deg,#00c3ff,#1e3a8a);
  border:none;border-radius:20px;
  color:#fff;cursor:pointer;
  transition:.3s;
}
.radio-btn:hover{transform:scale(1.1)}

.main-play{
  background:#00ffb3;
  color:#000;
  font-weight:bold;
}

/* LINKS */
.world{
  display:block;
  margin-top:8px;
  padding:10px;
  background:rgba(0,195,255,0.1);
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}
.world:hover{
  background:rgba(0,195,255,0.3);
  transform:scale(1.03);
}

/* PLAYER */
#winamp{
  margin-top:10px;
  padding:10px;
  border-top:1px solid rgba(0,195,255,0.3);
}

.artist{
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:#00c3ff;
  margin-bottom:10px;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,195,255,0.1);
  margin:3px 0;
  padding:6px;
  border-radius:8px;
  font-size:12px;
  transition:.3s;
}
.song:hover{
  background:rgba(0,195,255,0.25);
}

.song button{
  margin-left:5px;
  border:none;
  padding:4px 8px;
  border-radius:6px;
  cursor:pointer;
}

.play{background:#00c3ff;color:#000}
.stop{background:#ff4d4d;color:#fff}
</style>
</head>

<body>

<!-- AUDIO RADIO -->
<audio id="radio1" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="radio2" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
<audio id="radio3" src="https://stream.zeno.fm/w7atxdpk1pdvv"></audio>
<audio id="radio4" src="https://stream.zeno.fm/hswv0qwu7vgtv"></audio>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="topbar">
  <div class="status" id="status">⚡ OFFLINE</div>
  <div>by iegypt (106080) ramy</div>
</div>

<div class="container">
<div class="profile">

<div class="top">
<img src="https://xatimg.com/image/RKP5IrStF45l.png">

<div>
<div class="name">Ramy</div>
<div style="font-size:12px;color:#aaa;">ID: 106080</div>

<div class="radio-box">
<button class="radio-btn" onclick="playRadio(1)">🎧 قرآن</button>
<button class="radio-btn" onclick="playRadio(2)">🎶 ميلودي</button>
<button class="radio-btn" onclick="playRadio(3)">🎤 حماقي</button>
<button class="radio-btn" onclick="playRadio(4)">🔥 منوعات</button>
<button class="radio-btn main-play" onclick="toggleRadio()" id="mainPlay">▶ تشغيل</button>
</div>

</div>
</div>

<!-- LINKS -->
<a class="world" href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a class="world" href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a class="world" href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a class="world" href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>

<!-- PLAYER -->
<div id="winamp">
<div class="artist">🎤 ليل المحمدي</div>

<audio id="player"></audio>
<div id="list"></div>

</div>

</div>
</div>

<script>

/* LOGIN ENTER */
function enter(){
  if(password.value==="106080"){
    login.style.display="none";
    status.innerText="⚡ ONLINE";
  }
}
password.addEventListener("keydown",e=>{
  if(e.key==="Enter") enter();
});

/* RADIO */
let radios=[radio1,radio2,radio3,radio4];
let current=null;
let isPlaying=false;

function playRadio(i){
  radios.forEach(r=>{r.pause();r.currentTime=0});
  current=radios[i-1];
  current.play();
  isPlaying=true;
  mainPlay.innerText="⏸ إيقاف";
}

function toggleRadio(){
  if(!current) return;
  if(isPlaying){
    current.pause();
    isPlaying=false;
    mainPlay.innerText="▶ تشغيل";
  }else{
    current.play();
    isPlaying=true;
    mainPlay.innerText="⏸ إيقاف";
  }
}

/* SONGS بأسماء */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"]
];

let player=document.getElementById("player");
let list=document.getElementById("list");

songs.forEach(s=>{
  let div=document.createElement("div");
  div.className="song";
  div.innerHTML=`${s[0]}
  <div>
  <button class="play" onclick="player.src='${s[1]}';player.play()">▶</button>
  <button class="stop" onclick="player.pause()">⏹</button>
  </div>`;
  list.appendChild(div);
});

</script>

</body>
</html>
