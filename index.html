<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:hidden;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
}

.name{
  font-size:24px;
  text-shadow:0 0 10px #00f5ff;
}

/* SONG ITEM */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:3px 0;
  background:#00f5ff11;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* LOCK */
.lock-box{
  position:relative;
}

.lock-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

.lock-ui{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.45);
}

.lock-ui input{
  padding:8px;
  background:#111;
  border:none;
  color:#00f5ff;
  text-align:center;
  margin-top:8px;
}

.lock-ui button{
  margin-top:8px;
  background:#00f5ff;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- BOX 1 -->
<div class="panel">BOOT</div>

<!-- BOX 2 -->
<div class="panel">HACK</div>

<!-- BOX 3 LOCK -->
<div class="panel lock-box">
<img src="https://img.pikbest.com/backgrounds/20250126/guarding-your-digital-life-power-of-passwords-smarter-password-practices_11452980.jpg!f305cw">

<div class="lock-ui">
<div>🔐 ENTER PASSWORD</div>
<input type="password" id="pass">
<button onclick="check()">UNLOCK</button>
</div>
</div>

<!-- BOX 4 -->
<div class="panel profile">
<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY SYSTEM</div>
</div>

<!-- BOX 5 -->
<div class="panel" id="left"></div>

<!-- BOX 6 -->
<div class="panel" id="right"></div>

</div>

<script>

/* PASSWORD */
function check(){
if(pass.value==="106080"){
init();
}else alert("WRONG PASSWORD");
}

/* SONGS */
let songs=[
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

let audio=new Audio();

/* INIT */
function init(){

left.innerHTML="🎵 SONG LIST";
right.innerHTML="🎧 SONG LIST";

songs.slice(0,11).forEach((s,i)=>{
left.innerHTML+=`
<div class="song">${s[0]}<button onclick="play(${i})">▶</button></div>`;
});

songs.slice(11).forEach((s,i)=>{
right.innerHTML+=`
<div class="song">${s[0]}<button onclick="play(${i+11})">▶</button></div>`;
});

}

/* PLAY */
function play(i){
audio.src=songs[i][1];
audio.play();
}

</script>

</body>
</html>
