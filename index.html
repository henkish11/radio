<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM UI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#00f5ff;
  overflow:hidden;
}

/* ===== GRID (smaller) ===== */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:230px 1fr;
  height:100vh;
  gap:6px;
  padding:6px;
}

/* ===== PANELS ===== */
.panel{
  background:rgba(0,0,0,0.65);
  border:1px solid #00f5ff22;
  box-shadow:0 0 15px #00f5ff22;
  border-radius:8px;
  padding:8px;
  overflow:auto;
}

/* ===== BOOT ===== */
.boot{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.bar{
  width:80%;
  height:5px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.bar span{
  display:block;
  height:100%;
  width:0;
  background:#00f5ff;
  animation:load 3s forwards;
}

@keyframes load{to{width:100%}}

/* ===== TERMINAL ===== */
.terminal{
  font-family:monospace;
  color:#00ff00;
}

.hack{
  display:flex;
  gap:10px;
  align-items:center;
}

.hack img{
  width:60px;
  filter:drop-shadow(0 0 10px #00ff00);
}

/* ===== LOGIN ===== */
.login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.login input{
  width:80%;
  padding:8px;
  background:#111;
  border:1px solid #66faff;
  color:#66faff;
  text-align:center;
}

.login button{
  margin-top:10px;
  padding:6px 12px;
  background:#66faff;
  border:none;
  cursor:pointer;
}

/* ===== PROFILE ===== */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #00f5ff;
  box-shadow:0 0 15px #00f5ff;
}

.name{
  font-size:26px;
  text-shadow:0 0 10px #00f5ff;
}

/* RADIO */
.radio{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  justify-content:center;
}

.radio button{
  background:#00f5ff;
  border:none;
  padding:5px;
  font-size:10px;
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.links a{
  color:#00ffcc;
  font-size:11px;
  text-decoration:none;
}

/* ===== SONGS ===== */
.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  margin:4px 0;
  background:#00f5ff11;
  border-radius:6px;
  font-size:11px;
}

.song button{
  background:#00f5ff;
  border:none;
  cursor:pointer;
}

/* ===== PLAYER (NEW DESIGN) ===== */
.player{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:420px;
  background:rgba(10,10,10,0.85);
  border:1px solid #00f5ff55;
  backdrop-filter:blur(10px);
  border-radius:15px;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.song-info{
  display:flex;
  flex-direction:column;
  font-size:11px;
  color:#00f5ff;
}

.sub{
  font-size:9px;
  opacity:0.6;
}

.controls button{
  background:#00f5ff;
  border:none;
  padding:5px;
  margin:2px;
  border-radius:6px;
}

.volume input{
  width:70px;
}

.progress{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:3px;
  background:#111;
}

#bar{
  height:100%;
  width:0%;
  background:#00ffcc;
}

audio{display:none;}

</style>
</head>

<body>

<div class="dashboard">

<!-- 1 -->
<div class="panel boot">
<h3>BOOT RAMY SYSTEM</h3>
<div class="bar"><span></span></div>
</div>

<!-- 2 -->
<div class="panel terminal">
<div class="hack">
<img src="https://i.imgur.com/3ZQ3Z4M.png">
<div>
SYSTEM ONLINE<br>
ROOT ACCESS ✔
</div>
</div>
</div>

<!-- 3 -->
<div class="panel login">
<h3>ENTER PASSWORD</h3>
<input type="password" id="pass">
<button onclick="check()">ACCESS</button>
</div>

<!-- 4 PROFILE -->
<div class="panel profile">

<img class="avatar" src="https://xatimg.com/image/PtMzAMEPdOYG.png">
<div class="name">RAMY</div>

<div class="radio">
<button onclick="playRadio(0)">🎧</button>
<button onclick="playRadio(1)">🎶</button>
<button onclick="playRadio(2)">🎤</button>
<button onclick="playRadio(3)">🔥</button>
</div>

<div class="links">
<a href="#">2ra Chat</a>
<a href="#">7reqa Chat</a>
<a href="#">Trade</a>
<a href="#">Cambio</a>
</div>

</div>

<!-- 5 -->
<div class="panel" id="left"></div>

<!-- 6 -->
<div class="panel" id="right"></div>

</div>

<!-- PLAYER -->
<div class="player">

<div class="song-info">
<div id="title">No Song</div>
<div class="sub">Ramy System</div>
</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>

<div class="volume">
<input type="range" min="0" max="1" step="0.1" onchange="vol(this.value)">
</div>

<div class="progress"><div id="bar"></div></div>

</div>

<audio id="audio"></audio>
<audio id="radio"></audio>

<script>

/* LOGIN */
function check(){
if(pass.value==="106080") alert("ACCESS GRANTED");
else alert("WRONG PASSWORD");
}

/* RADIO */
let radios=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3",
"https://stream.zeno.fm/w7atxdpk1pdvv",
"https://stream.zeno.fm/hswv0qwu7vgtv"
];

let radio=document.getElementById("radio");
let rplay=false;

function playRadio(i){
radio.src=radios[i];
radio.play();
rplay=true;
}

function toggleRadio(){
if(!radio.src) radio.src=radios[0];
rplay?radio.pause():radio.play();
rplay=!rplay;
}

/* SONGS */
let songs=[["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]];

let audio=document.getElementById("audio");
let index=0;

let left=document.getElementById("left");
let right=document.getElementById("right");

songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="song";
div.innerHTML=`${s[0]} <button onclick="playSong('${s[1]}')">▶</button>`;
(i<11?left:right).appendChild(div);
});

/* PLAYER */
function playSong(url){
audio.src=url;
audio.play();
index=songs.findIndex(s=>s[1]===url);
document.getElementById("title").innerText=songs[index][0];
}

function next(){
index=(index+1)%songs.length;
playSong(songs[index][1]);
}

function prev(){
index=(index-1+songs.length)%songs.length;
playSong(songs[index][1]);
}

function toggle(){
audio.paused?audio.play():audio.pause();
}

function vol(v){
audio.volume=v;
}

audio.ontimeupdate=function(){
document.getElementById("bar").style.width=
(audio.currentTime/audio.duration)*100+"%";
};

</script>

</body>
</html>
